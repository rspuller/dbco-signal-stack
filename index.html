  ? 'Generated ' + _RAW_DATA.generated_date
  : 'Generated ' + REPORT.generated_date;

// ── Build UI ─────────────────────────────────────────────────────────────────
const app = document.getElementById('app');
app.innerHTML = '';

function el(tag, cls, inner) {
  const e = document.createElement(tag);
  if (cls)   e.className = cls;
  if (inner) e.innerHTML = inner;
  return e;
}

function metricCard(label, value, sub, wow) {
  const card = el('div', 'metric-card');
  let wowHtml = '';
  if (wow != null) {
    if (wow === 0) {
      wowHtml = '<div class="metric-wow flat">— No change</div>';
    } else if (wow === Infinity || wow === -Infinity) {
      // Previous period was 0
      const arrow = wow > 0 ? '&#9650;' : '&#9660;';
      const cls = wow > 0 ? 'up' : 'down';
      wowHtml = `<div class="metric-wow ${cls}">${arrow} New</div>`;
    } else {
      const pct = Math.abs(wow * 100).toFixed(0);
      const arrow = wow > 0 ? '&#9650;' : '&#9660;';
      const cls = wow > 0 ? 'up' : 'down';
      wowHtml = `<div class="metric-wow ${cls}">${arrow} ${pct}% vs prev</div>`;
    }
  }
  card.innerHTML = `<div class="metric-label">${label}</div><div class="metric-value">${value}</div>${sub ? `<div class="metric-sub">${sub}</div>` : ''}${wowHtml}`;
  return card;
}

function pRowItem(label, value) {
  return `<div class="prow-item"><strong>${value}</strong><span>${label}</span></div>`;
}

// ── Summary accordion ────────────────────────────────────────────────────────
function buildSummary() {
  const entities = REPORT.entities;
  const rows = ENTITY_ORDER.map(key => {
    const e   = entities[key];
    const sty = ENTITY_STYLES[key];
    if (!e) return '';
    const cpl = e.cpl != null ? fmt.currency(e.cpl) : '—';
    return `
      <tr class="entity-row" data-entity-key="${key}" style="--accent:${sty.accent};--metric-bg:${getMetricBg(sty)}">
        <td><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${sty.accent};margin-right:.4rem;vertical-align:middle;"></span>${e.label}</td>
        <td>${e.platforms.join(', ') || '—'}</td>
        <td class="num">${fmt.currency(e.total_spend)}</td>
        <td class="num">${fmt.int(e.total_clicks)}</td>
        <td class="num">${fmt.dec(e.total_conversions)}</td>
        <td class="num">${cpl}</td>
      </tr>`;
  }).join('');

  const totalSpend = ENTITY_ORDER.reduce((s, k) => s + (entities[k]?.total_spend || 0), 0);

  const acc = buildAccordion('summary', '', 'Weekly Summary', [], [], fmt.currency(totalSpend), false);
  const bodyInner = acc.querySelector('.acc-body-inner');
  bodyInner.innerHTML = `
    <table class="summary-table">
      <thead><tr>
        <th>Entity</th><th>Platforms</th>
        <th class="num">Spend</th><th class="num">Clicks</th>
        <th class="num">Conv.</th><th class="num">CPL</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
  return acc;
}

// ── Entity accordion ─────────────────────────────────────────────────────────
function buildEntityAccordion(key) {
  const e   = REPORT.entities[key];
  const sty = ENTITY_STYLES[key];
  if (!e) return null;

  const chips = [];
  if (e.total_clicks)      chips.push(`${fmt.int(e.total_clicks)} clicks`);
  if (e.total_conversions) chips.push(`${fmt.dec(e.total_conversions)} conv.`);
  if (e.cpl != null)       chips.push(`${fmt.currency(e.cpl)} CPL`);

  const acc = buildAccordion(key, sty.accent, e.label, e.platforms, chips, fmt.currency(e.total_spend));
  acc.style.setProperty('--metric-bg', getMetricBg(sty));
  const bodyInner = acc.querySelector('.acc-body-inner');
  bodyInner.innerHTML = buildEntityBody(key, e, sty);

  // Inject "Analyze" button into header if analysis data exists for this entity
  if (_ANALYSIS[key]) {
    const analyzeBtn = document.createElement('button');
    analyzeBtn.className = 'analyze-btn';
    analyzeBtn.textContent = 'Analyze';
    analyzeBtn.title = 'Open campaign analysis';
    analyzeBtn.addEventListener('click', ev => {
      ev.stopPropagation();
      openAnalysisModal(key);
    });
    const hdr = acc.querySelector('.acc-header');
    hdr.insertBefore(analyzeBtn, hdr.querySelector('.chevron'));
  }

  return acc;
}

function buildEntityBody(key, e, sty) {
  let html = '';

  // No data state
  const hasAny = e.google || e.meta || e.linkedin;
  if (!hasAny) {
    return html + `<p class="empty-state">No active campaigns this period.</p>`;
  }

  // At-a-glance metrics — blended across all active platforms
  html += `<div class="metrics-grid">`;

  const blendSpend = e.total_spend;
  const blendClicks = e.total_clicks;
  const blendConv = e.total_conversions;
  const blendImpr = (e.google?.impressions || 0) + (e.meta?.impressions || 0) + (e.linkedin?.impressions || 0);
  const blendCTR = blendImpr ? blendClicks / blendImpr : null;
  const blendCPL = blendConv ? blendSpend / blendConv : null;
  const blendReach = Math.max(e.meta?.reach || 0, e.linkedin?.reach || 0) || null;
  const blendCPM = blendImpr ? (blendSpend * 1000 / blendImpr) : null;

  // Previous-period ad metrics for vs-prev deltas
  const _spendPrev = e.total_spend_prev ?? null;
  const _convPrev  = e.total_conversions_prev ?? null;
  const _cplPrev   = e.cpl_prev ?? null;
  function _adWow(curr, prev) {
    if (prev == null) return null;
    if (prev === 0)   return curr > 0 ? Infinity : null;
    return (curr - prev) / prev;
  }
  const spendWow = _adWow(blendSpend, _spendPrev);
  const convWow  = _adWow(blendConv, _convPrev);
  // CPL: lower is better — invert direction so down = green
  const cplCurr = blendCPL;
  const cplWow  = (_cplPrev != null && _cplPrev > 0 && cplCurr != null)
    ? -((cplCurr - _cplPrev) / _cplPrev)   // invert: cost decrease = positive
    : null;

  html += metricCard('Spend', fmt.currency(blendSpend), e.platforms.join(' + '), spendWow).outerHTML;
  html += metricCard('Clicks', fmt.int(blendClicks), `CTR ${fmt.pct(blendCTR)}`).outerHTML;
  if (key !== 'events_506') {
    html += metricCard('Conversions', fmt.dec(blendConv), `CPL ${fmt.currency(blendCPL)}`, convWow).outerHTML;
  } else {
    html += metricCard('Conversions', fmt.dec(blendConv), null, convWow).outerHTML;
  }
  const blendCPA = blendConv ? blendSpend / blendConv : null;
  const funnelRev = e.funnel?.revenue_collected || 0;
  const blendROAS = (funnelRev && blendSpend) ? (funnelRev / blendSpend) : null;
  html += metricCard('Impressions', fmt.int(blendImpr), null).outerHTML;
  html += metricCard('CPA', fmt.currency(blendCPA), 'Cost per Acquisition', cplWow).outerHTML;
  html += metricCard('CPM', fmt.currency(blendCPM), null).outerHTML;
  html += `</div>`; // /metrics-grid
  // ROAS row hidden until attribution is sorted out
  // if (blendROAS != null) {
  //   html += `<div class="metrics-grid" style="grid-template-columns:repeat(2,1fr);margin-top:-.65rem">`;
  //   html += metricCard('ROAS', blendROAS.toFixed(2) + 'x', fmt.currency(funnelRev) + ' revenue / ' + fmt.currency(blendSpend) + ' spend').outerHTML;
  //   html += metricCard('Revenue', fmt.currency(funnelRev), 'From CRM').outerHTML;
  //   html += `</div>`;
  // }

  // Per-platform detail rows — broken out by campaign
  function gRow(c) {
    return `<div class="platform-row">
      ${pRowItem('Spend', fmt.currency(c.spend))}
      ${pRowItem('Impressions', fmt.int(c.impressions))}
      ${pRowItem('Clicks', fmt.int(c.clicks))}
      ${pRowItem('CTR', fmt.pct(c.ctr))}
      ${pRowItem('CPC', fmt.currency(c.cpc))}
      ${pRowItem('Conversions', fmt.dec(c.conversions))}
      ${pRowItem('CPL', fmt.currency(c.cost_per_conversion))}
      ${pRowItem('Quality Score', c.quality_score != null ? fmt.dec(c.quality_score,1) : '—')}
      ${pRowItem('Impr. Share', c.search_impression_share != null ? fmt.pct(c.search_impression_share) : '—')}
    </div>`;
  }
  function mRow(c) {
    return `<div class="platform-row">
      ${pRowItem('Spend', fmt.currency(c.spend))}
      ${pRowItem('Impressions', fmt.int(c.impressions))}
      ${pRowItem('Reach', fmt.int(c.reach))}
      ${pRowItem('Frequency', c.frequency != null ? fmt.dec(c.frequency,2) : '—')}
      ${pRowItem('Link Clicks', fmt.int(c.link_clicks))}
      ${key !== 'events_506' ? pRowItem('Leads', fmt.int(c.leads)) : ''}
      ${pRowItem('CPM', fmt.currency(c.cpm))}
      ${pRowItem('CPC', fmt.currency(c.cpc))}
      ${pRowItem('CTR', fmt.pct(c.ctr))}
      ${key !== 'events_506' ? pRowItem('CPL', fmt.currency(c.cost_per_lead)) : ''}
      ${pRowItem('Engagement', fmt.int(c.engagement))}
    </div>`;
  }
  function lRow(c) {
    return `<div class="platform-row">
      ${pRowItem('Spend', fmt.currency(c.spend))}
      ${pRowItem('Impressions', fmt.int(c.impressions))}
      ${pRowItem('Reach', fmt.int(c.reach))}
      ${pRowItem('Clicks', fmt.int(c.clicks))}
      ${pRowItem('CTR', fmt.pct(c.ctr))}
      ${pRowItem('CPC', fmt.currency(c.cpc))}
      ${pRowItem('CPM', fmt.currency(c.cpm))}
      ${pRowItem('Conversions', fmt.int(c.conversions))}
      ${pRowItem('Leads (1-click)', fmt.int(c.leads))}
      ${pRowItem('Form Opens', fmt.int(c.form_opens))}
      ${pRowItem('Eng. Rate', c.engagement_rate != null ? fmt.pct(c.engagement_rate) : '—')}
    </div>`;
  }

  if (e.google && e.google_campaigns && e.google_campaigns.length) {
    const multi = e.google_campaigns.length > 1;
    html += `<div class="platform-section">
      <div class="platform-label" style="color:${sty.accent}">Google Ads</div>`;
    for (const c of e.google_campaigns) {
      html += `<div class="campaign-name">${c.name}</div>${gRow(c)}`;
    }
    if (multi) {
      html += `<div class="campaign-name campaign-total">Total</div>${gRow(e.google)}`;
    }
    html += `</div>`;
  }

  if (e.meta && e.meta_campaigns && e.meta_campaigns.length) {
    const multi = e.meta_campaigns.length > 1;
    html += `<div class="platform-section">
      <div class="platform-label" style="color:${sty.accent}">Meta</div>`;
    for (const c of e.meta_campaigns) {
      html += `<div class="campaign-name">${c.name}</div>${mRow(c)}`;
    }
    if (multi) {
      html += `<div class="campaign-name campaign-total">Total</div>${mRow(e.meta)}`;
    }
    html += `</div>`;
  }

  if (e.linkedin && e.linkedin_campaigns && e.linkedin_campaigns.length) {
    const multi = e.linkedin_campaigns.length > 1;
    html += `<div class="platform-section">
      <div class="platform-label" style="color:${sty.accent}">LinkedIn</div>`;
    for (const c of e.linkedin_campaigns) {
      html += `<div class="campaign-name">${c.name}</div>${lRow(c)}`;
    }
    if (multi) {
      html += `<div class="campaign-name campaign-total">Total</div>${lRow(e.linkedin)}`;
    }
    html += `</div>`;
  }

  // ── Top 3 Google Keywords ────────────────────────────────────────────────
  const topKws = e.top_keywords || [];
  if (topKws.length > 0) {
    const hasConv = topKws.some(k => k.conversions > 0);
    html += `<div class="insights-section">
      <div class="section-subtitle" style="margin-bottom:.35rem;font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#888;">Top Keywords — Google Search</div>
      <table class="insights-table">
        <thead><tr>
          <th>Keyword</th>
          <th class="ins-metric">Clicks</th>
          ${hasConv ? '<th class="ins-metric">Conv.</th>' : ''}
          <th class="ins-metric">Spend</th>
        </tr></thead>
        <tbody>${topKws.map(k => `<tr>
          <td title="${k.keyword}">${k.keyword}</td>
          <td class="ins-metric">${fmt.int(k.clicks)}</td>
          ${hasConv ? `<td class="ins-metric">${k.conversions > 0 ? fmt.dec(k.conversions, 1) : '—'}</td>` : ''}
          <td class="ins-metric">${fmt.currency(k.spend)}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
  }

  // ── Top 3 Meta Ads ───────────────────────────────────────────────────────
  const topAds = e.top_meta_ads || [];
  if (topAds.length > 0) {
    const hasLeads = topAds.some(a => a.leads > 0);
    html += `<div class="insights-section">
      <div class="section-subtitle" style="margin-bottom:.35rem;font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#888;">Top Ads — Meta (by CTR)</div>
      <table class="insights-table">
        <thead><tr>
          <th>Ad Name</th>
          <th class="ins-metric">Spend</th>
          <th class="ins-metric">CTR</th>
          ${hasLeads ? '<th class="ins-metric">Leads</th>' : ''}
        </tr></thead>
        <tbody>${topAds.map(a => `<tr>
          <td title="${a.ad_name}">${a.ad_name || '(unnamed)'}</td>
          <td class="ins-metric">${fmt.currency(a.spend)}</td>
          <td class="ins-metric"><span class="ins-badge-ctr">${a.ctr.toFixed(1)}%</span></td>
          ${hasLeads ? `<td class="ins-metric">${a.leads > 0 ? a.leads : '—'}</td>` : ''}
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
  }

  // ── Inline recommendation signals (last-month analysis, top 3) ────────────
  // These are scoped to the last-month analysis window, not the currently
  // selected preset.  The full detail is in the Campaign Analysis modal.
  const _entityRecs = (_ANALYSIS[key] || {}).recommendations || [];
  if (_entityRecs.length > 0) {
    const topRecs = _entityRecs.slice(0, 3);
    html += `<div class="inline-recs">
      <div class="inline-recs-label">Signals — last month</div>`;
    for (const r of topRecs) {
      const p = r.priority.toLowerCase();
      html += `<div class="rec-item ${p}" data-rec-id="${r.rec_id || ''}">
        <div class="rec-row">
          <span class="rec-badge ${p}">${r.priority}</span>
          <span class="rec-cat">${r.category}</span>
        </div>
        <div class="rec-title">${r.title}</div>
      </div>`;
    }
    html += `</div>`;
  }

  return html;
}

function buildSearchTerms(st, sty) {
  function termLi(t, cls) {
    const conv = t.conversions > 0 ? ' converted' : '';
    return `<li class="${cls}${t.conversions > 0 ? ' converted' : ''}">
      <span class="term-name">${t.term}</span>
      <span class="term-meta">${t.clicks} clk · $${(+t.spend).toFixed(2)}</span>
    </li>`;
  }

  const topHtml = st.top.map(t => termLi(t, '')).join('');
  const negHtml = st.negatives.map(t => termLi(t, 'negative')).join('');

  return `
  <div class="search-terms-section">
    <div class="search-terms-grid">
      <div>
        <h4>Top search terms — suggest as keywords</h4>
        <ul class="term-list">${topHtml || '<li style="color:#999;font-style:italic">No data</li>'}</ul>
      </div>
      <div>
        <h4>Search terms to review — negative keyword candidates</h4>
        <ul class="term-list">${negHtml || '<li style="color:#999;font-style:italic">No data</li>'}</ul>
      </div>
    </div>
  </div>`;
}

// ── Generic leads section ────────────────────────────────────────────────────
function _leadItemLabel(l, statusField) {
  const name = l.name || '(unnamed)';
  const stat = statusField ? (l[statusField] || '') : '';
  if (!stat) return name;
  const lower = stat.toLowerCase();
  if (lower === 'booked' || lower === 'active') {
    return `${name} <span style="color:var(--clr-success);font-weight:700">(CLOSED WON)</span>`;
  }
  return `${name} <span style="opacity:.6">(${stat})</span>`;
}

function buildLeadsSection(leads, opts) {
  const label    = (opts && opts.label)    || 'Leads';
  const pfx      = (opts && opts.idPrefix) || 'leads';
  const sFld     = (opts && opts.statusField) || '';
  const count    = leads.length;
  const btnLabel = count === 0 ? 'No leads this period' : 'Select a lead';

  const itemsHtml = count === 0
    ? '<div class="leads-dropdown-item" style="color:#999;font-style:italic;cursor:default">No leads this period</div>'
    : leads.map((l, i) =>
        `<div class="leads-dropdown-item" data-lead-idx="${i}">${_leadItemLabel(l, sFld)}</div>`
      ).join('');

  return `
  <div class="leads-section">
    <div class="leads-header">
      <span class="leads-label">${label}</span>
      <span class="leads-count-badge">${count}</span>
      <div class="leads-dropdown" id="${pfx}-dd">
        <button class="leads-dropdown-btn" id="${pfx}-dd-btn" ${count === 0 ? 'disabled style="opacity:.5;cursor:default"' : ''}>
          ${btnLabel}
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </button>
        <div class="leads-dropdown-list" id="${pfx}-dd-list">${itemsHtml}</div>
      </div>
    </div>
  </div>`;
}

function initLeadsDropdown(leads, idPrefix, openFn) {
  const pfx  = idPrefix || 'leads';
  const btn  = document.getElementById(pfx + '-dd-btn');
  const list = document.getElementById(pfx + '-dd-list');
  if (!btn || !list || leads.length === 0) return;

  btn.addEventListener('click', e => {
    e.stopPropagation();
    list.classList.toggle('open');
  });

  list.addEventListener('click', e => {
    const item = e.target.closest('[data-lead-idx]');
    if (!item) return;
    list.classList.remove('open');
    openFn(leads[+item.dataset.leadIdx]);
  });
}

function _showModal(title, fieldPairs) {
  const modal = document.getElementById('lead-modal');
  if (!modal) return;
  modal.querySelector('.lead-modal-title').textContent = title || '(unnamed)';
  modal.querySelector('.lead-modal-fields').innerHTML = fieldPairs.map(([k, v]) =>
    `<span class="lead-modal-key">${k}</span><span class="lead-modal-val">${v || '—'}</span>`
  ).join('');
  modal.style.display = 'flex';
}

// ── Campaign Analysis modal ──────────────────────────────────────────────────

  const data = _ANALYSIS[entityKey];

  const rangeEl = document.getElementById('analysis-range');
  if (_ANALYSIS_RANGE.from) {
    const d = new Date(_ANALYSIS_RANGE.from + 'T00:00:00');
    const month = d.toLocaleString('en-US', { month: 'short' });
    rangeEl.textContent = 'Last Month — ' + month + ' ' + d.getFullYear();
  } else {
    rangeEl.textContent = '';

  let html = '';

  // ── Recommendations ──────────────────────────────────────────────────────

  html += `<div class="analysis-sec-hdr">Recommendations</div>`;

  if (!campaigns.length) {
    html += `<div class="analysis-empty">No Google Ads campaigns in this period.</div>`;

      <th class="num">Clicks</th>
      <th class="num">Conv.</th>

      <th class="num">QS</th>

        <td class="num">${fmt.currency(c.spend)}</td>
        <td class="num">${fmt.int(c.clicks)}</td>
        <td class="num">${fmt.dec(c.conversions, 1)}</td>
        <td class="num">${c.cpa != null ? fmt.currency(c.cpa) : '—'}</td>
        <td class="num">${qsHtml}</td>
        <td class="num">${sisHtml}</td>
      </tr>`;
    }
    html += `</tbody></table>`;
  }

  // ── Campaign Health — Meta ───────────────────────────────────────────────
  const metaCampaigns = data.meta_campaigns || [];
  if (metaCampaigns.length) {
    html += `<div class="analysis-sec-hdr">Campaign Health — Meta (Facebook / Instagram)</div>`;
    html += `<table class="analysis-table"><thead><tr>
      <th>Campaign</th>
      <th class="num">Spend</th>
      <th class="num">Impr.</th>
      <th class="num">CTR</th>
      <th class="num">CPM</th>
      <th class="num">Freq.</th>
      <th class="num">Leads</th>
      <th class="num">CPL</th>
    </tr></thead><tbody>`;
    for (const c of metaCampaigns) {
      const ctrHtml  = c.ctr  != null ? (c.ctr * 100).toFixed(2) + '%' : '—';
      const cpmHtml  = c.cpm  != null ? fmt.currency(c.cpm) : '—';
      const cplHtml  = c.cpl  != null ? fmt.currency(c.cpl) : '—';
      const freqHtml = c.frequency != null
        ? `<span class="qs-pill ${c.health}">${c.frequency}</span>` : '—';
      html += `<tr>
        <td style="max-width:240px;word-break:break-word">${c.name}</td>
        <td class="num">${fmt.currency(c.spend)}</td>
        <td class="num">${fmt.int(c.impressions)}</td>
        <td class="num">${ctrHtml}</td>
        <td class="num">${cpmHtml}</td>
        <td class="num">${freqHtml}</td>
        <td class="num">${fmt.dec(c.leads, 1)}</td>
        <td class="num">${cplHtml}</td>
      </tr>`;
    }
    html += `</tbody></table>`;
  }

  // ── Search Term Waste ────────────────────────────────────────────────────
  const terms    = data.terms || {};
  const noClick  = terms.no_click_waste  || [];
  const lowConv  = terms.low_conv_waste  || [];
  const wasteTot = terms.waste_total     || 0;
  const wasteLabel = wasteTot > 0 ? ` — ${fmt.currency(wasteTot)} at risk` : '';
  html += `<div class="analysis-sec-hdr">Search Term Waste${wasteLabel}</div>`;

  if (noClick.length) {
    html += `<div style="font-size:.72rem;font-weight:700;color:var(--text-muted);margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.04em">Zero-click terms — add as negatives</div>`;
    for (const t of noClick) {
      html += `<div class="waste-row">
        <span class="waste-term">${t.term}</span>
        <span class="waste-spend">${fmt.currency(t.spend)}</span>
        <span class="waste-meta">${fmt.int(t.impressions)} impr · 0 clicks</span>
      </div>`;
    }
  }
  if (lowConv.length) {
    html += `<div style="font-size:.72rem;font-weight:700;color:var(--text-muted);margin:${noClick.length?'.85rem':'0'} 0 .35rem;text-transform:uppercase;letter-spacing:.04em">Clicks but zero conversions — review</div>`;
    for (const t of lowConv) {
      const ctrPct = t.ctr ? Math.round(t.ctr * 100) + '% CTR' : '';
      html += `<div class="waste-row">
        <span class="waste-term">${t.term}</span>
        <span class="waste-spend">${fmt.currency(t.spend)}</span>
        <span class="waste-meta">${fmt.int(t.clicks)} clicks · 0 conv${ctrPct ? ' · ' + ctrPct : ''}</span>
      </div>`;
    }
  }
  if (!noClick.length && !lowConv.length) {
    html += `<div class="analysis-empty">No significant search term waste detected.</div>`;
  }

  // ── Lead Quality ─────────────────────────────────────────────────────────
  const lq = data.lead_quality;
  if (lq && lq.total > 0) {
    html += `<div class="analysis-sec-hdr">Lead Quality — ${fmt.int(lq.total)} leads this period</div>`;

    // Source breakdown
    const srcEntries = Object.entries(lq.by_source)
      .filter(([, d]) => d.total > 0)
      .sort((a, b) => b[1].total - a[1].total);
    for (const [src, d] of srcEntries) {
      const qualStr = d.qualified > 0 ? ` · Qualified: ${Math.round(d.qualified / d.total * 100)}%` : '';
      const wonStr  = d.won > 0      ? ` · Won: ${Math.round(d.won / d.total * 100)}%`       : '';
      html += `<div class="lq-row">
        <span class="lq-src">${src}</span>
        <span class="lq-cnt">${d.total}</span>
        <span class="lq-pct">${qualStr}${wonStr}</span>
      </div>`;
    }

    // Consumer email warning banner
    if (lq.consumer_email_pct != null && lq.consumer_email_pct > 0.3 && lq.paid_total >= 3) {
      html += `<div style="font-size:.78rem;color:#d97706;background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:6px;padding:.5rem .75rem;margin:.75rem 0">
        ${Math.round(lq.consumer_email_pct * 100)}% of paid search leads used personal email addresses
        (gmail / yahoo / hotmail) — indicating consumer intent rather than business buyers.
      </div>`;
    }

    // Junk leads
    const junkLeads = lq.junk_leads      || [];
    const suspLeads = lq.suspicious_leads || [];
    if (junkLeads.length) {
      html += `<div style="font-size:.72rem;font-weight:700;color:var(--text-muted);margin:.85rem 0 .35rem;text-transform:uppercase;letter-spacing:.04em">Confirmed junk (${junkLeads.length})</div>`;
      for (const l of junkLeads) {
        html += `<div class="junk-row">
          <span class="junk-name">${l.name}</span>
          <span class="junk-email"> · ${l.email || '(no email)'}</span>
          <span style="color:var(--text-muted)"> · ${l.stage || ''}</span>
          <div class="junk-why">${l.reasons.join('; ')}</div>
        </div>`;
      }
    }
    if (suspLeads.length) {
      html += `<div style="font-size:.72rem;font-weight:700;color:var(--text-muted);margin:.85rem 0 .35rem;text-transform:uppercase;letter-spacing:.04em">Suspicious — review (${suspLeads.length})</div>`;
      for (const l of suspLeads) {
        const lp = l.landing_page ? ` · ${l.landing_page}` : '';
        html += `<div class="junk-row">
          <span class="junk-name">${l.name}</span>
          <span class="junk-email"> · ${l.email || '(no email)'}</span>
          <span style="color:var(--text-muted)"> · ${l.stage || ''}${lp}</span>
          <div class="susp-why">${l.reasons.join('; ')}</div>
        </div>`;
      }
    }
    if (!junkLeads.length && !suspLeads.length) {
      html += `<div class="analysis-empty" style="margin-top:.5rem">No junk or suspicious leads detected.</div>`;
    }
  }

  body.innerHTML = html;
  modal.style.display = 'flex';
  modal.scrollTop = 0;
}

function openLeadModal(lead) {
  const rev = lead.revenue || '—';

  const statusDisplay = (isBooked && hasRevenue)
    ? '<span style="color:var(--clr-success);font-weight:700">CLOSED WON</span>'
    : (lead.status || '—');
  const a = lead.attribution || {};
  const fields = [
    ['Created',         lead.created],
    ['Email',           lead.email],
    ['Event',           lead.event_type],
    ['Event Date',      lead.event_date],
    ['Guests',          lead.guests],
    ['Status',          statusDisplay],
    ['Revenue',         rev],
  ];
  // Attribution section
  const sourceLabel = a.source_label || lead.lead_source || '';
  if (sourceLabel) fields.push(['Source Channel', sourceLabel]);
  if (a.keyword) {
    const matchLabel = a.match_type ? ` (${a.match_type.toLowerCase().replace('_',' ')})` : '';
    fields.push(['Keyword', a.keyword + matchLabel]);

  if (a.campaign) fields.push(['Campaign', a.campaign]);
  if (!sourceLabel && lead.lead_source) fields.push(['Lead Source', lead.lead_source]);
  _showModal(lead.name, fields);
}

// ── Accordion builder ────────────────────────────────────────────────────────
function buildAccordion(key, accent, name, platforms, chips, spend, startOpen=false) {
  const sty = ENTITY_STYLES[key] || {};
  const acc = el('div', 'accordion' + (startOpen ? ' open' : ''));
  acc.id = 'entity-' + key.replace('_funnel', '');   // stable deep-link anchor
  acc.dataset.entityKey = key.replace('_funnel', '');
  if (accent) acc.style.setProperty('--accent', accent);
  else if (sty.accent) acc.style.setProperty('--accent', sty.accent);
  acc.style.setProperty('--metric-bg', getMetricBg(sty));

  const swatchHtml = accent ? `<div class="swatch"></div>` : '';

  const pillsHtml = platforms.length
    ? `<div class="pills">${platforms.map(p=>`<span class="pill">${p}</span>`).join('')}</div>`
    : '';

  const chipsHtml = chips.length
    ? `<div class="chips">${chips.map(c=>`<span class="chip">${c}</span>`).join('')}</div>`
    : '';

  const hdr = el('button', 'acc-header');
  hdr.setAttribute('aria-expanded', startOpen ? 'true' : 'false');
  hdr.innerHTML = `
    ${swatchHtml}
    <span class="acc-name">${name}</span>
    ${pillsHtml}
    ${chipsHtml}
    <span class="spend-badge">${spend}</span>
    <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"></polyline>
    </svg>
  `;

  const body = el('div', 'acc-body');
  const bodyInner = el('div', 'acc-body-inner');
  body.appendChild(bodyInner);

  acc.appendChild(hdr);
  acc.appendChild(body);

  if (startOpen) {
    requestAnimationFrame(() => {
      body.style.maxHeight = 'none';
      body.style.overflow = 'visible';
    });
  }

  body.addEventListener('transitionend', (ev) => {
    if (ev.propertyName === 'max-height' && acc.classList.contains('open')) {
      body.style.overflow = 'visible';
      body.style.maxHeight = 'none';
    }
  });

  hdr.addEventListener('click', () => {
    const isOpen = acc.classList.contains('open');
    if (isOpen) {
      body.style.overflow = 'hidden';
      body.style.maxHeight = body.scrollHeight + 'px';
      requestAnimationFrame(() => { body.style.maxHeight = '0'; });
      acc.classList.remove('open');
      hdr.setAttribute('aria-expanded', 'false');
    } else {
      body.style.overflow = 'hidden';
      acc.classList.add('open');
      body.style.maxHeight = body.scrollHeight + 'px';
      hdr.setAttribute('aria-expanded', 'true');
    }
  });

  return acc;
}

function fmtDuration(secs) {
  if (secs == null) return '—';
  const m = Math.floor(secs / 60);
  const s = Math.round(secs % 60);
  return m > 0 ? `${m}m ${s}s` : `${s}s`;
}

function buildSeoBody(entity, data, sty) {
  const ga4 = data.ga4 || {};
  const org  = ga4.organic;
  const daily = data.daily_organic || [];
  const wm = data.wow_mom || {};
  const lp = data.landing_pages || [];
  const nvr = data.new_vs_returning || {};
  const gsc = data.organic_search;
  let html = '';

  // ── Organic Sessions with trend + WoW ──
  html += `<div class="seo-section-label" style="color:${sty.accent}">Organic Sessions</div>`;
  if (!org || org.sessions === 0) {
    html += `<p class="empty-state">No organic search sessions this period.</p>`;
  } else {
    // Summary metrics row
    html += `<div class="metrics-grid">`;
    html += metricCard('Sessions', fmt.int(org.sessions), 'Organic Search').outerHTML;
    html += metricCard('Users', fmt.int(org.users), null).outerHTML;
    html += metricCard('Engaged', fmt.int(org.engaged_sessions), null).outerHTML;
    html += `</div>`;

    // WoW change
    if (wm.wow_change != null) {
      const pct = (wm.wow_change * 100).toFixed(1);
      const cls = wm.wow_change >= 0 ? 'up' : 'down';
      const arrow = wm.wow_change >= 0 ? '\u25B2' : '\u25BC';
      html += `<div class="seo-change-row">
        <div class="seo-change-item">
          <span class="change-val ${cls}">${arrow} ${Math.abs(pct)}%</span>
          <span class="change-label">vs previous ${wm.period_days}-day period (${fmt.int(wm.prev_total)} sessions)</span>
        </div>
      </div>`;
    }

    // Sparkline trend
    if (daily.length > 1) {
      html += `<canvas class="seo-trend-canvas" data-daily='${JSON.stringify(daily)}' data-color="${sty.accent}"></canvas>`;
    }
  }

  // ── Organic Conversions ──
  if (org && org.conversions > 0) {
    html += `<div class="seo-section-label">Organic Conversions</div>`;
    html += `<div class="seo-conv-row">
      <div class="seo-conv-item">
        <strong>${fmt.int(org.conversions)}</strong>
        <span>Conversions</span>
      </div>
      <div class="seo-conv-item">
        <strong>${fmt.pct(org.conversion_rate)}</strong>
        <span>Conversion Rate</span>
      </div>
    </div>`;
  }

  // ── Engagement Rate ──
  if (org && org.engagement_rate != null) {
    html += `<div class="seo-section-label">Organic Engagement</div>`;
    html += `<div class="metrics-grid">`;
    html += metricCard('Engagement Rate', fmt.pct(org.engagement_rate), null).outerHTML;
    html += metricCard('Bounce Rate', fmt.pct(org.bounce_rate), null).outerHTML;
    html += metricCard('Avg. Session', fmtDuration(org.avg_session_duration), null).outerHTML;
    html += `</div>`;
  }

  // ── Google Search Impressions + Avg Position ──
  html += `<div class="seo-section-label">Google Search Performance</div>`;
  if (gsc) {
    html += `<div class="seo-gsc-grid">`;
    html += metricCard('Clicks', fmt.int(gsc.clicks), null).outerHTML;
    html += metricCard('Impressions', fmt.int(gsc.impressions), null).outerHTML;
    html += metricCard('Avg. Position', gsc.avg_position != null ? gsc.avg_position.toFixed(1) : '—', null).outerHTML;
    html += `</div>`;
  } else {
    html += `<p class="empty-state">Pending GSC Connection</p>`;
  }

  // ── Top Search Queries (by Clicks) ──
  const topQueries = (data.top_queries || []).slice().sort((a, b) =>
    b.clicks - a.clicks || b.impressions - a.impressions || a.position - b.position
  );
  html += `<div class="seo-section-label">Top Search Queries by Clicks</div>`;
  if (topQueries.length) {
    html += `<table class="seo-lp-table seo-query-table"><thead><tr>
      <th>Query</th><th>Clicks</th><th>Avg. Pos</th>
    </tr></thead><tbody>`;
    for (const q of topQueries.slice(0, 10)) {
      html += `<tr>
        <td>${q.query}</td>
        <td>${fmt.int(q.clicks)}</td>
        <td>${q.position.toFixed(1)}</td>
      </tr>`;
    }
    html += `</tbody></table>`;
  } else {
    html += `<p class="empty-state">No search query data this period.</p>`;
  }

  // ── Top 10 Organic Landing Pages ──
  html += `<div class="seo-section-label">Top Organic Landing Pages</div>`;
  if (lp.length) {
    html += `<table class="seo-lp-table"><thead><tr><th>Page</th><th>Sessions</th></tr></thead><tbody>`;
    for (const p of lp) {
      const style = p.is_other ? ' style="color:#888;font-style:italic;border-top:1px solid #e0e0e0"' : '';
      html += `<tr><td${style}>${p.page}</td><td${style}>${fmt.int(p.sessions)}</td></tr>`;
    }
    html += `</tbody></table>`;
  } else {
    html += `<p class="empty-state">No organic landing page data this period.</p>`;
  }

  // ── New vs Returning Users ──
  html += `<div class="seo-section-label">New vs Returning (Organic)</div>`;
  if (nvr.new_sessions || nvr.returning_sessions) {
    const newPct = nvr.new_pct != null ? (nvr.new_pct * 100).toFixed(0) : 0;
    const retPct = nvr.returning_pct != null ? (nvr.returning_pct * 100).toFixed(0) : 0;
    html += `<div class="seo-nvr-bar">
      <div class="new" style="width:${newPct}%">${newPct}%</div>
      <div class="ret" style="width:${retPct}%">${retPct}%</div>
    </div>`;
    html += `<div class="seo-nvr-legend">
      <div>New: <span>${fmt.int(nvr.new_sessions)}</span> sessions · <span>${fmt.int(nvr.new_users)}</span> users</div>
      <div>Returning: <span>${fmt.int(nvr.returning_sessions)}</span> sessions · <span>${fmt.int(nvr.returning_users)}</span> users</div>
    </div>`;
  } else {
    html += `<p class="empty-state">No new vs returning data this period.</p>`;
  }

  // ── All Queries (expandable) ──
  if (topQueries.length > 10) {
    const remainId = `gsc-more-${entity}`;
    html += `<div style="text-align:center;margin:.5rem 0">
      <button class="seo-show-more-btn" onclick="document.getElementById('${remainId}').classList.toggle('hidden');this.textContent=this.textContent==='Show all queries'?'Show fewer':'Show all queries'">Show all queries</button>
    </div>`;
    html += `<table id="${remainId}" class="seo-lp-table seo-query-table hidden"><thead><tr>
      <th>Query</th><th>Clicks</th><th>Avg. Pos</th>
    </tr></thead><tbody>`;
    for (const q of topQueries.slice(10)) {
      html += `<tr>
        <td>${q.query}</td>
        <td>${fmt.int(q.clicks)}</td>
        <td>${q.position.toFixed(1)}</td>
      </tr>`;
    }
    html += `</tbody></table>`;
  }

  return html;
}

function buildSeoAccordion(entity) {
  const data = (REPORT.seo || {})[entity];
  const sty  = ENTITY_STYLES[entity];
  if (!data || !sty) return null;

  const org = data.ga4?.organic;
  const gsc = data.organic_search;
  const chips = [];
  if (org && org.sessions) chips.push(`${fmt.int(org.sessions)} organic sessions`);
  if (gsc && gsc.impressions) chips.push(`${fmt.int(gsc.impressions)} search impressions`);
  if (org && org.engagement_rate != null) chips.push(`${fmt.pct(org.engagement_rate)} engaged`);

  const acc = buildAccordion(entity, sty.accent, data.label, ['SEO'], chips, '');
  acc.style.setProperty('--metric-bg', getMetricBg(sty));

  // Hide the spend badge (it's empty for SEO)
  const badge = acc.querySelector('.spend-badge');
  if (badge) badge.style.display = 'none';

  acc.querySelector('.acc-body-inner').innerHTML = buildSeoBody(entity, data, sty);
  return acc;
}

  // Summary chips for accordion header
  const chips = [];
  if (cfg.isToast) {
    if (funnel.guests) chips.push(`${fmt.int(funnel.guests)} guests`);
    if (funnel.net_sales) chips.push(fmt.currency(funnel.net_sales));
  } else {
    if (funnel.new_leads) chips.push(`${funnel.new_leads} leads`);
    const totalFunnelRev = (funnel.revenue_collected || 0) + (funnel.booking_fees || 0) + (funnel.oneoff_fees || 0);
    if (totalFunnelRev) chips.push(fmt.currency(totalFunnelRev));
  }

  const acc = buildAccordion(cfg.key + '_funnel', sty.accent, cfg.label, [], chips, '');
  acc.style.setProperty('--metric-bg', getMetricBg(sty));
  const badge = acc.querySelector('.spend-badge');
  if (badge) badge.style.display = 'none';

  let html = '';

  // Helper for vs-prev indicators
  let funnelPrev;
  if (cfg.key === 'office_cowork') {
    funnelPrev = entities.private_office?.funnel_prev || {};
  } else {
    funnelPrev = entities[cfg.key]?.funnel_prev || {};
  }
  function wowChange(curr, prev) {
    if (prev == null || curr == null) return null;
    if (prev === 0 && curr === 0) return 0;
    if (prev === 0) return curr > 0 ? Infinity : null;
    return (curr - prev) / prev;
  }

  // -- Nerra Dining: custom 6-box restaurant performance layout ---------------
  if (cfg.isToast) {
    html += `<div class="section-subtitle" style="margin-bottom:.4rem;font-size:.85rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#888;">Sales Performance</div>`;
    const fG  = funnel.guests || 0;
    const fO  = funnel.orders || 0;
    const fNS = funnel.net_sales || 0;
    const fAG = funnel.avg_guest || 0;
    const fAO = funnel.avg_order || 0;
    const fDC = funnel.discounts || 0;
    const pG  = funnelPrev.guests;
    const pO  = funnelPrev.orders;
    const pNS = funnelPrev.net_sales;
    const pAG = funnelPrev.avg_guest;
    const pAO = funnelPrev.avg_order;
    const pDC = funnelPrev.discounts;
    // Row 1: Guests → Orders → Net Sales (volume & revenue)
    const guestToOrder = fG > 0 ? (fO / fG * 100).toFixed(1) + ' orders/100 guests' : null;
    html += `<div class="funnel-grid" style="grid-template-columns:repeat(3,1fr)">`;
    html += metricCard(fLabels[0], fmt.int(fG), null, wowChange(fG, pG)).outerHTML;
    html += metricCard(fLabels[1], fmt.int(fO), guestToOrder, wowChange(fO, pO)).outerHTML;
    html += metricCard(fLabels[2], fmt.currency(fNS), null, wowChange(fNS, pNS)).outerHTML;
    html += `</div>`;
    // Row 2: Avg/Guest → Avg/Order → Discounts & Comps (efficiency & health)
    const discPct = fNS > 0 ? ((fDC / (fNS + fDC)) * 100).toFixed(1) + '% of gross' : null;
    html += `<div class="funnel-grid" style="grid-template-columns:repeat(3,1fr);margin-top:-.25rem">`;
    html += metricCard(fLabels[3], fmt.currency(fAG), 'per cover', wowChange(fAG, pAG)).outerHTML;
    html += metricCard(fLabels[4], fmt.currency(fAO), 'per check', wowChange(fAO, pAO)).outerHTML;
    html += metricCard(fLabels[5], fmt.currency(fDC), discPct, wowChange(fDC, pDC)).outerHTML;
    html += `</div>`;

    acc.querySelector('.acc-body-inner').innerHTML = html;
    return acc;
  }

  // -- Ghost/Stripe: content-subscription layout (D&D ReinKarnated) -----------
  if (cfg.isGhost) {
    const fNF  = funnel.new_free_members  || 0;
    const fNP  = funnel.new_paid_members  || 0;
    const fTF  = funnel.total_free_members || 0;
    const fTP  = funnel.total_paid_members || 0;
    const fMRR = funnel.mrr               || 0;
    const fRev = funnel.revenue_collected  || 0;
    const pNF  = funnelPrev.new_free_members;
    const pNP  = funnelPrev.new_paid_members;
    const pTF  = funnelPrev.total_free_members;
    const pTP  = funnelPrev.total_paid_members;
    const pRev = funnelPrev.revenue_collected;
    const convRate = fTF > 0 ? ((fTP / fTF) * 100).toFixed(1) + '% of free' : null;
    const newConv  = fNF > 0 ? ((fNP / Math.max(fNF, 1)) * 100).toFixed(1) + '% conv.' : null;
    const mktg = funnel.marketing || {};
    // Marketing funnel (paid ads → new free subscribers)
    html += `<div class="section-subtitle" style="margin-bottom:.4rem;font-size:.85rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#888;">Marketing Conversion Funnel</div>`;
    html += `<div class="funnel-grid" style="grid-template-columns:repeat(3,1fr)">`;
    html += metricCard('Impressions', fmt.int(mktg.impressions || 0), null,
      wowChange(mktg.impressions || 0, mktg.impressions_prev ?? null)).outerHTML;
    html += metricCard('Clicks', fmt.int(mktg.clicks || 0), null,
      wowChange(mktg.clicks || 0, mktg.clicks_prev ?? null)).outerHTML;
    html += metricCard('New Free Subscribers', fmt.int(fNF), null,
      wowChange(fNF, pNF ?? null)).outerHTML;
    html += `</div>`;
    // Audience snapshot
    html += `<div class="section-subtitle" style="margin-top:1rem;margin-bottom:.4rem;font-size:.85rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#888;">Audience & Conversions</div>`;
    html += `<div class="funnel-grid" style="grid-template-columns:repeat(3,1fr)">`;
    html += metricCard('Total Free Members', fmt.int(fTF), null, wowChange(fTF, pTF ?? null)).outerHTML;
    html += metricCard('New Paid Members', fmt.int(fNP), newConv, wowChange(fNP, pNP ?? null)).outerHTML;
    html += metricCard('Total Paid Members', fmt.int(fTP), convRate, wowChange(fTP, pTP ?? null)).outerHTML;
    html += `</div>`;
    // Revenue
    html += `<div class="section-subtitle" style="margin-top:1rem;margin-bottom:.4rem;font-size:.85rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#888;">Revenue</div>`;
    html += `<div class="funnel-grid" style="grid-template-columns:repeat(2,1fr)">`;
    html += metricCard('MRR', fmt.currency(fMRR), 'monthly recurring', null).outerHTML;
    html += metricCard('Revenue This Period', fmt.currency(fRev), null, wowChange(fRev, pRev ?? null)).outerHTML;
    html += `</div>`;
    acc.querySelector('.acc-body-inner').innerHTML = html;
    return acc;
  }

  // -- Standard entities: Marketing Conversion Funnel -------------------------
  const mktg = funnel.marketing || {};
  html += `<div class="section-subtitle" style="margin-bottom:.4rem;font-size:.85rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#888;">Marketing Conversion Funnel</div>`;
  html += `<div class="funnel-grid" style="grid-template-columns:repeat(3,1fr)">`;
  html += metricCard('Impressions', fmt.int(mktg.impressions || 0), null,
    wowChange(mktg.impressions || 0, mktg.impressions_prev ?? null)).outerHTML;
  html += metricCard('Clicks', fmt.int(mktg.clicks || 0), null,
    wowChange(mktg.clicks || 0, mktg.clicks_prev ?? null)).outerHTML;
  html += metricCard('Conversions', fmt.int(mktg.conversions || 0), null,
    wowChange(mktg.conversions || 0, mktg.conversions_prev ?? null)).outerHTML;
  html += `</div>`;

  // -- Standard entities: Sales Funnel ----------------------------------------
  html += `<div class="section-subtitle" style="margin-top:1rem;margin-bottom:.4rem;font-size:.85rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#888;">Sales Funnel</div>`;
  const fNL = funnel.new_leads || 0;
  const fPS = funnel.proposals_sent || 0;
  const fEB = funnel.events_booked || 0;
  const fRC = funnel.revenue_collected || 0;
  const pNL = funnelPrev.new_leads;
  const pPS = funnelPrev.proposals_sent;
  const pEB = funnelPrev.events_booked;
  const pRC = funnelPrev.revenue_collected;
  const rate1 = fNL > 0 ? ((fPS / fNL) * 100).toFixed(0) + '% conv.' : null;
  const rate2 = fPS > 0 ? ((fEB / fPS) * 100).toFixed(0) + '% conv.' : null;
  html += `<div class="funnel-grid">`;
  html += metricCard(fLabels[0], fmt.int(fNL), null, wowChange(fNL, pNL)).outerHTML;
  html += metricCard(fLabels[1], fmt.int(fPS), rate1, wowChange(fPS, pPS)).outerHTML;
  html += metricCard(fLabels[2], fmt.int(fEB), rate2, wowChange(fEB, pEB)).outerHTML;
  html += metricCard(fLabels[3], fmt.currency(fRC), null, wowChange(fRC, pRC)).outerHTML;
  html += `</div>`;
  // Extra revenue boxes for Private Office & Coworking
  if (cfg.key === 'office_cowork' && fLabels.length > 4) {
    const fBF = funnel.booking_fees || 0;
    const fOF = funnel.oneoff_fees || 0;
    const pBF = funnelPrev.booking_fees;
    const pOF = funnelPrev.oneoff_fees;
    html += `<div class="funnel-grid" style="grid-template-columns:repeat(2,1fr);margin-top:-.25rem">`;
    html += metricCard(fLabels[4], fmt.currency(fBF), null, wowChange(fBF, pBF)).outerHTML;
    html += metricCard(fLabels[5], fmt.currency(fOF), null, wowChange(fOF, pOF)).outerHTML;
    html += `</div>`;
  }
  // Leads Turned Down box for Events at 506 and Catering
  if ((cfg.key === 'events_506' || cfg.key === 'catering') && fLabels.length > 4) {
    const fTD = funnel.turned_down || 0;
    const pTD = funnelPrev.turned_down;
    html += `<div class="funnel-grid" style="grid-template-columns:repeat(1,1fr);max-width:25%;margin-top:-.25rem">`;
    html += metricCard(fLabels[4], fmt.int(fTD), null, wowChange(fTD, pTD)).outerHTML;
    html += `</div>`;
  }

  // Leads dropdown if applicable
  if (cfg.leadsKey) {
    // For office_cowork, leads are on the private_office entity
    const srcEntity = cfg.key === 'office_cowork' ? 'private_office' : cfg.key;
    let leads = Array.isArray(entities[srcEntity]?.[cfg.leadsKey]) ? entities[srcEntity][cfg.leadsKey] : [];
    // Filter out Turned Down / Closed / Lost and sort by status for Events at 506 and Nerra Catering
    if (cfg.key === 'events_506' || cfg.key === 'catering') {
      const _hide = new Set(['turned down', 'closed', 'lost']);
      leads = leads.filter(l => !_hide.has((l[cfg.statusField] || '').toLowerCase()));
      const _statusOrder = { 'new': 0, 'contacted': 1, 'proposal sent': 2, 'tentative': 3, 'booked': 4 };
      leads.sort((a, b) => (_statusOrder[(a[cfg.statusField]||'').toLowerCase()] ?? 99) - (_statusOrder[(b[cfg.statusField]||'').toLowerCase()] ?? 99));
    }
    // Smashing Boxes: split into Leads with No Deal / Leads with Deals
    if (cfg.key === 'smashing_boxes') {
      const contactLeads = leads.filter(l => l._source === 'contact');
      const dealLeads    = leads.filter(l => l._source !== 'contact');
      html += `<div class="leads-split-wrapper">`;
      html += buildLeadsSection(contactLeads, { label: 'Leads with No Deal', idPrefix: cfg.leadsPrefix + '-nodeal', statusField: cfg.statusField });
      html += buildLeadsSection(dealLeads, { label: 'Leads with Deals', idPrefix: cfg.leadsPrefix + '-deal', statusField: cfg.statusField });
      html += `</div>`;
    } else {
      html += buildLeadsSection(leads, { label: cfg.leadsLabel, idPrefix: cfg.leadsPrefix, statusField: cfg.statusField });
    }
  }

  acc.querySelector('.acc-body-inner').innerHTML = html;
  return acc;
}

// ── Collapsible section builder ─────────────────────────────────────────────
// ── Forecasting Section ───────────────────────────────────────────────────────
function buildForecastSection() {
  const FORECAST = _RAW_DATA.forecast || {};
  if (!FORECAST['30'] && !FORECAST['60'] && !FORECAST['90']) return null;

  const fmtMoney = v => (v == null || v === 0) ? '<span class="forecast-dash">—</span>' :
    '$' + Math.round(v).toLocaleString();

  const tierLabel = t => ({locked:'Locked', committed:'Committed', probable:'Probable'}[t] || t);

  // Renders the inner content for one horizon
  function renderHorizon(h) {
    const hd = FORECAST[String(h)];
    if (!hd) return el('p', '', 'No forecast data.');

    const container = el('div');
    const total = hd.total || {};
    const entities = hd.entities || {};

    // ── KPI cards ─────────────────────────────────────────────────────────
    const kpiRow = el('div', 'forecast-kpi-row');
    const kpis = [
      { label: 'Locked',    val: total.locked,    tier: 'locked' },
      { label: 'Committed', val: total.committed, tier: 'committed' },
      { label: 'Probable',  val: total.probable,  tier: 'probable' },
      { label: 'Total',     val: total.total,      tier: 'total' },
    ];
    kpis.forEach(k => {
      const card = el('div', 'metric-card');
      const dot = k.tier !== 'total'
        ? `<span class="forecast-legend-dot ${k.tier}" style="display:inline-block;margin-right:.35rem"></span>` : '';
      card.innerHTML = `
        <div class="metric-label">${dot}${k.label}</div>
        <div class="metric-value" data-forecast-kpi="${k.tier}" style="font-size:1.25rem">${k.val ? '$' + Math.round(k.val).toLocaleString() : '—'}</div>
      `;
      kpiRow.appendChild(card);
    });
    container.appendChild(kpiRow);

    // ── Confidence bar ────────────────────────────────────────────────────
    const grandTotal = total.total || 1;
    const pctLocked    = Math.max(0, Math.round((total.locked    || 0) / grandTotal * 100));
    const pctCommitted = Math.max(0, Math.round((total.committed || 0) / grandTotal * 100));
    const pctProbable  = Math.max(0, 100 - pctLocked - pctCommitted);

    const barWrap = el('div', 'forecast-bar-wrap');
    barWrap.innerHTML = `
      <div class="forecast-bar">
        <div class="forecast-bar-seg locked"    style="width:${pctLocked}%"></div>
        <div class="forecast-bar-seg committed" style="width:${pctCommitted}%"></div>
        <div class="forecast-bar-seg probable"  style="width:${pctProbable}%"></div>
      </div>
      <div class="forecast-legend">
        <div class="forecast-legend-item">
          <span class="forecast-legend-dot locked"></span>
          <span>Locked</span>
          <span class="forecast-legend-val">${fmtMoney(total.locked)}</span>
        </div>
        <div class="forecast-legend-item">
          <span class="forecast-legend-dot committed"></span>
          <span>Committed</span>
          <span class="forecast-legend-val">${fmtMoney(total.committed)}</span>
        </div>
        <div class="forecast-legend-item">
          <span class="forecast-legend-dot probable"></span>
          <span>Probable</span>
          <span class="forecast-legend-val">${fmtMoney(total.probable)}</span>
        </div>
      </div>
    `;
    container.appendChild(barWrap);

    // ── Entity table ──────────────────────────────────────────────────────
    const table = el('table', 'forecast-table');
    table.innerHTML = `
      <thead>
        <tr>
          <th style="width:35%">Entity</th>
          <th>Locked</th>
          <th>Committed</th>
          <th>Probable</th>
          <th>Total</th>
        </tr>
      </thead>
    `;
    const tbody = el('tbody');
    table.appendChild(tbody);

    const ENTITY_ORDER = ['events_506','catering','private_office','oak_and_glow','smashing_boxes'];
    const totals = { locked: 0, committed: 0, probable: 0, total: 0 };

    ENTITY_ORDER.forEach(key => {
      const ent = entities[key];
      if (!ent) return;

      // Running totals for footer
      totals.locked    += ent.locked    || 0;
      totals.committed += ent.committed || 0;
      totals.probable  += ent.probable  || 0;
      totals.total     += ent.total     || 0;

      const hasItems = (ent.items || []).length > 0;
      const hasNote  = ent.note;

      // Entity header row
      const entityRow = el('tr', 'forecast-entity-row' + (hasItems || hasNote ? ' expandable' : ''));
      entityRow.dataset.forecastKey = key;
      entityRow.dataset.locked    = ent.locked    || 0;
      entityRow.dataset.committed = ent.committed || 0;
      entityRow.dataset.probable  = ent.probable  || 0;
      entityRow.dataset.fcTotal   = ent.total     || 0;
      entityRow.innerHTML = `
        <td>
          <div class="forecast-entity-name">
            ${(hasItems || hasNote) ? `<svg class="forecast-entity-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>` : '<span style="width:14px;display:inline-block;flex-shrink:0"></span>'}
            ${ent.label}
          </div>
        </td>
        <td>${fmtMoney(ent.locked)}</td>
        <td>${fmtMoney(ent.committed)}</td>
        <td>${fmtMoney(ent.probable)}</td>
        <td style="font-weight:700">${fmtMoney(ent.total)}</td>
      `;
      tbody.appendChild(entityRow);

      // Expandable items row
      if (hasItems || hasNote) {
        const itemsRow = el('tr', 'forecast-items-row');
        itemsRow.dataset.forecastKey = key;
        itemsRow.style.display = 'none';
        const itemsTd = el('td');
        itemsTd.colSpan = 5;

        if (hasItems) {
          const itemTable = el('table', 'forecast-items-table');
          itemTable.innerHTML = `<thead><tr>
            <td style="font-weight:600;color:var(--text-muted);font-size:.7rem;padding-left:2rem">Name</td>
            <td style="text-align:right;font-weight:600;color:var(--text-muted);font-size:.7rem">Date / Stage</td>
            <td style="text-align:right;font-weight:600;color:var(--text-muted);font-size:.7rem">Tier</td>
            <td style="text-align:right;font-weight:600;color:var(--text-muted);font-size:.7rem">Future Revenue</td>
          </tr></thead>`;
          const itbody = el('tbody');
          (ent.items || []).forEach(item => {
            const tr = el('tr');
            const dateOrStage = item.date || item.created || item.stage || '—';
            tr.innerHTML = `
              <td>${item.name || '—'}</td>
              <td>${dateOrStage}</td>
              <td><span class="forecast-tier-chip ${item.tier}">${tierLabel(item.tier)}</span></td>
              <td>${fmtMoney(item.revenue)}</td>
            `;
            itbody.appendChild(tr);
          });
          itemTable.appendChild(itbody);
          const scrollWrap = el('div', 'forecast-items-scroll');
          scrollWrap.appendChild(itemTable);
          itemsTd.appendChild(scrollWrap);
        }

        if (hasNote) {
          const noteDiv = el('div', 'forecast-note');
          noteDiv.textContent = ent.note;
          itemsTd.appendChild(noteDiv);
        }

        itemsRow.appendChild(itemsTd);
        tbody.appendChild(itemsRow);

        // Toggle expand/collapse
        entityRow.addEventListener('click', () => {
          const isOpen = entityRow.classList.contains('open');
          entityRow.classList.toggle('open', !isOpen);
          itemsRow.style.display = isOpen ? 'none' : '';
        });
      }
    });

    // Footer totals row
    const footerRow = el('tr', 'forecast-total-row');
    footerRow.innerHTML = `
      <td>Portfolio Total</td>
      <td>${fmtMoney(totals.locked)}</td>
      <td>${fmtMoney(totals.committed)}</td>
      <td>${fmtMoney(totals.probable)}</td>
      <td>${fmtMoney(totals.total)}</td>
    `;
    tbody.appendChild(footerRow);
    container.appendChild(table);

    return container;
  }

  // ── Outer section wrapper ────────────────────────────────────────────────
  const outer = el('div', 'forecast-root');

  // Horizon toggle bar
  const horizons = [30, 60, 90];
  let activeHorizon = 30;
  let _currentFilterKeys = null; // null = show all; [] = hide all; [...keys] = subset

  const horizonBar = el('div', 'forecast-horizon-bar');
  const contentSlot = el('div');

  // Recompute visible entities, KPI cards, bar, legend, and footer based on filter
  function _updateForecastFilter(visibleKeys) {
    _currentFilterKeys = visibleKeys;
    if (!contentSlot.firstChild) return;

    // Show/hide entity header rows
    contentSlot.querySelectorAll('tr.forecast-entity-row[data-forecast-key]').forEach(row => {
      row.style.display = (!visibleKeys || visibleKeys.includes(row.dataset.forecastKey)) ? '' : 'none';
    });

    // For hidden entities, also hide their items rows
    contentSlot.querySelectorAll('tr.forecast-items-row[data-forecast-key]').forEach(row => {
      if (visibleKeys && !visibleKeys.includes(row.dataset.forecastKey)) {
        row.style.display = 'none';
      }
    });

    // Recompute sums from visible entity rows
    const visRows = [...contentSlot.querySelectorAll('tr.forecast-entity-row[data-forecast-key]')]
      .filter(r => r.style.display !== 'none');
    const sums = { locked: 0, committed: 0, probable: 0, total: 0 };
    visRows.forEach(r => {
      sums.locked    += parseFloat(r.dataset.locked    || 0);
      sums.committed += parseFloat(r.dataset.committed || 0);
      sums.probable  += parseFloat(r.dataset.probable  || 0);
      sums.total     += parseFloat(r.dataset.fcTotal   || 0);
    });

    // Update KPI card values
    contentSlot.querySelectorAll('[data-forecast-kpi]').forEach(valEl => {
      const t = valEl.dataset.forecastKpi;
      const v = sums[t] ?? 0;
      valEl.innerHTML = v ? '$' + Math.round(v).toLocaleString() : '—';
    });

    // Update confidence bar widths
    const gt = sums.total || 1;
    const pL = Math.max(0, Math.round(sums.locked    / gt * 100));
    const pC = Math.max(0, Math.round(sums.committed / gt * 100));
    const pP = Math.max(0, 100 - pL - pC);
    const segs = [...contentSlot.querySelectorAll('.forecast-bar-seg')];
    if (segs.length >= 3) { segs[0].style.width = pL+'%'; segs[1].style.width = pC+'%'; segs[2].style.width = pP+'%'; }

    // Update legend values
    const legVals = [...contentSlot.querySelectorAll('.forecast-legend-val')];
    if (legVals.length >= 3) {
      legVals[0].innerHTML = fmtMoney(sums.locked);
      legVals[1].innerHTML = fmtMoney(sums.committed);
      legVals[2].innerHTML = fmtMoney(sums.probable);
    }

    // Update footer row totals
    const footerRow = contentSlot.querySelector('tr.forecast-total-row');
    if (footerRow) {
      const tds = footerRow.querySelectorAll('td');
      if (tds.length >= 5) {
        tds[1].innerHTML = fmtMoney(sums.locked);
        tds[2].innerHTML = fmtMoney(sums.committed);
        tds[3].innerHTML = fmtMoney(sums.probable);
        tds[4].innerHTML = fmtMoney(sums.total);
      }
    }
  }
  outer._updateForecastFilter = _updateForecastFilter;

  function setHorizon(h) {
    activeHorizon = h;
    horizonBar.querySelectorAll('.forecast-horizon-btn').forEach(btn => {
      btn.classList.toggle('active', +btn.dataset.h === h);
    });
    contentSlot.innerHTML = '';
    contentSlot.appendChild(renderHorizon(h));
    if (_currentFilterKeys !== null) _updateForecastFilter(_currentFilterKeys);
  }

  horizons.forEach(h => {
    const btn = el('button', 'forecast-horizon-btn');
    btn.dataset.h = h;
    btn.textContent = h + '-Day';
    btn.addEventListener('click', () => setHorizon(h));
    horizonBar.appendChild(btn);
  });

  outer.appendChild(horizonBar);
  outer.appendChild(contentSlot);
  setHorizon(30);  // default

  return outer;
}

function buildCollapsibleSection(title, id, startOpen=false) {
  const wrapper = el('div', '', '');
  wrapper.id = id;

  const toggle = el('div', 'section-toggle' + (startOpen ? ' open' : ''));
  toggle.innerHTML = `
    <h2 class="section-heading" style="margin-bottom:0">${title}</h2>
    <svg class="section-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"></polyline>
    </svg>
  `;

  const content = el('div', 'section-content' + (startOpen ? ' open' : ''));
  if (startOpen) content.style.maxHeight = 'none';

  toggle.addEventListener('click', () => {
    const isOpen = toggle.classList.contains('open');
    if (isOpen) {
      toggle.classList.remove('open');
      content.classList.remove('open');
      content.style.maxHeight = '0';
    } else {
      toggle.classList.add('open');
      content.classList.add('open');
      content.style.maxHeight = 'none';
    }
  });

  wrapper.appendChild(toggle);
  wrapper.appendChild(content);
  return { wrapper, content };
}

// ── Executive Summary ────────────────────────────────────────────────────────
function buildExecutiveSummary() {
  const entities = REPORT.entities;

  // Gather funnel data per entity (same logic as buildFunnelAccordion)
  const _HARDCODED_EXEC_ENTITIES = [
    { key: 'events_506',    label: 'Events at 506',               entityKey: 'events_506',     statusField: 'status' },
    { key: 'catering',      label: 'Nerra Catering',              entityKey: 'catering',       statusField: 'status' },
    { key: 'nerra_dining',  label: 'Nerra Dining',                entityKey: 'nerra_dining',   statusField: null, isToast: true },
    { key: 'office_cowork', label: 'Private Office & Coworking',  entityKey: 'private_office', statusField: 'status' },
    { key: 'oak_and_glow',  label: 'Oak & Glow Med Spa',          entityKey: 'oak_and_glow',   statusField: 'stage' },
    { key: 'smashing_boxes',label: 'Smashing Boxes',              entityKey: 'smashing_boxes', statusField: 'stage' },
  ];
  const EXEC_ENTITIES = REPORT.exec_entities || _HARDCODED_EXEC_ENTITIES;

  function getFunnel(cfg) {
    if (cfg.key === 'office_cowork') return entities.private_office?.funnel || {};
    if (cfg.isToast) return entities.nerra_dining?.funnel || {};
    if (cfg.isGhost) return entities[cfg.entityKey]?.funnel || {};
    return entities[cfg.key]?.funnel || {};
  }
  function getFunnelPrev(cfg) {
    if (cfg.key === 'office_cowork') return entities.private_office?.funnel_prev || {};
    if (cfg.isToast) return entities.nerra_dining?.funnel_prev || {};
    if (cfg.isGhost) return entities[cfg.entityKey]?.funnel_prev || {};
    return entities[cfg.key]?.funnel_prev || {};
  }
  function getSpend(cfg) {
    if (cfg.key === 'office_cowork') {
      return (entities.private_office?.total_spend || 0) + (entities.coworking?.total_spend || 0);
    }
    return entities[cfg.entityKey]?.total_spend || 0;
  }
  function getAccent(cfg) {
    const sty = ENTITY_STYLES[cfg.key] || ENTITY_STYLES[cfg.entityKey];
    return sty?.accent || '#888';
  }
  function getLeads(cfg) {
    if (cfg.isToast || cfg.isGhost) return [];  // Nerra Dining uses guest count; Ghost has no individual lead records
    let leads;
    switch (cfg.key) {
      case 'events_506':     leads = REPORT.entities?.events_506?.leads || []; break;
      case 'catering':       leads = REPORT.entities?.catering?.leads || []; break;
      case 'office_cowork':  leads = REPORT.entities?.private_office?.orn_leads || []; break;
      case 'oak_and_glow':   leads = REPORT.entities?.oak_and_glow?.ghl_leads || []; break;
      case 'smashing_boxes': leads = REPORT.entities?.smashing_boxes?.hs_leads || []; break;
      default: leads = [];
    }
    // Filter out Turned Down / Closed / Lost from dropdown for Events at 506 and Catering
    if (cfg.key === 'events_506' || cfg.key === 'catering') {
      const _hide = new Set(['turned down', 'closed', 'lost']);
      leads = leads.filter(l => !_hide.has((l[cfg.statusField] || '').toLowerCase()));
    }
    return leads;
  }
  function getLeadModalFn(cfg) {
    switch (cfg.key) {
      case 'events_506':     return openLeadModal;
      case 'catering':       return openLeadModal;
      case 'office_cowork':  return openOrnLeadModal;
      case 'oak_and_glow':   return openGhlLeadModal;
      case 'smashing_boxes': return openHsLeadModal;
      default: return openLeadModal;
    }
  }

  // Aggregate totals
  let totalLeads = 0, totalNewRevenue = 0, totalSpend = 0;
  let prevTotalLeads = 0, prevTotalNewRevenue = 0;
  const rows = [];

  // Scorecard Revenue column: total invoiced revenue for PO&CW, funnel revenue for others
  function getScoreCardRevenue(cfg) {
    const ent = (cfg.key === 'office_cowork') ? entities.private_office : entities[cfg.entityKey];
    if (ent && ent.exec_revenue != null) return ent.exec_revenue;
    const f = (cfg.key === 'office_cowork') ? (ent?.funnel || {}) : (entities[cfg.entityKey]?.funnel || {});
    return f.revenue_collected || 0;
  }

  EXEC_ENTITIES.forEach(cfg => {
    const f = getFunnel(cfg);
    const fp = getFunnelPrev(cfg);
    const nl = cfg.isGhost ? (f.new_free_members || 0) : (f.new_leads || 0);
    const funnelRev = (f.revenue_collected || 0) + (f.booking_fees || 0) + (f.oneoff_fees || 0);  // new revenue only (for KPI card)
    const scoreRev = (cfg.isToast || cfg.isGhost) ? (f.revenue_collected || 0) : getScoreCardRevenue(cfg);
    const spend = cfg.isToast ? 0 : getSpend(cfg);
    const prevNl = cfg.isGhost ? (fp.new_free_members || 0) : (fp.new_leads || 0);
    const prevFunnelRev = (fp.revenue_collected || 0) + (fp.booking_fees || 0) + (fp.oneoff_fees || 0);

    if (!cfg.isToast) totalLeads += nl;  // guest count not included in "Total New Leads"
    totalNewRevenue += funnelRev;
    if (!cfg.isToast) totalSpend += spend;
    if (!cfg.isToast) prevTotalLeads += prevNl;
    prevTotalNewRevenue += prevFunnelRev;

    // WoW for leads
    let wowLeads;
    if (prevNl === 0 && nl === 0) wowLeads = 0;
    else if (prevNl === 0) wowLeads = Infinity;
    else wowLeads = (nl - prevNl) / prevNl;

    rows.push({ cfg, nl, rev: scoreRev, spend, wowLeads, leads: getLeads(cfg), modalFn: getLeadModalFn(cfg), statusField: cfg.statusField });
  });

  // Portfolio-level WoW
  function wowPct(curr, prev) {
    if (prev === 0 && curr === 0) return 0;
    if (prev === 0) return Infinity;
    return (curr - prev) / prev;
  }
  const wowTotalLeads = wowPct(totalLeads, prevTotalLeads);
  const wowTotalNewRev = wowPct(totalNewRevenue, prevTotalNewRevenue);
  // const blendedROAS   = totalSpend > 0 ? totalNewRevenue / totalSpend : null;

  // vs-prev for MRR, MTD revenue, ad spend
  const mrr = REPORT.mrr || 0;
  const prevMrr = REPORT.prev_mrr || 0;
  const wowMrr = wowPct(mrr, prevMrr);
  const mtdRevenue = REPORT.mtd_revenue || 0;
  const prevMtdRevenue = REPORT.prev_mtd_revenue || 0;
  const wowMtd = wowPct(mtdRevenue, prevMtdRevenue);
  const prevTotalSpend = REPORT.prev_total_spend || 0;
  const wowSpend = wowPct(totalSpend, prevTotalSpend);
  const mtdLabel = REPORT.mtd_month_label || '';

  // Store per-entity data for dynamic KPI filtering
  const _execRowData = rows.map(r => {
    const f = getFunnel(r.cfg);
    const fp = getFunnelPrev(r.cfg);
    return {
      key: r.cfg.key,
      isToast: !!r.cfg.isToast,
      isGhost: !!r.cfg.isGhost,
      nl: r.nl,
      prevNl: r.cfg.isGhost ? (fp.new_free_members || 0) : (fp.new_leads || 0),
      funnelRev: (f.revenue_collected || 0) + (f.booking_fees || 0) + (f.oneoff_fees || 0),
      prevFunnelRev: (fp.revenue_collected || 0) + (fp.booking_fees || 0) + (fp.oneoff_fees || 0),
      spend: r.spend,
      scoreRev: r.rev,
    };
  });
  // Expose for entity filter to access
  window._execRowData = _execRowData;
  window._execMrr = mrr;
  window._execPrevMrr = prevMrr;
  window._execMtdRevenue = mtdRevenue;
  window._execPrevMtdRevenue = prevMtdRevenue;
  window._execMtdLabel = mtdLabel;
  window._execPrevTotalSpend = prevTotalSpend;

  // Build HTML
  const section = el('div', 'exec-summary');
  let html = '';
  html += `<div class="exec-summary-subtitle">Portfolio Overview &mdash; ${REPORT.date_range}</div>`;

  const _kpiLabels = REPORT.kpi_labels || {};
  const _mrrSubtitle = EXEC_ENTITIES.some(e => e.key === 'office_cowork') ? 'Private Office & Coworking' : 'Subscription MRR';
  const _hiddenKpis = _RAW_DATA.hidden_kpis || [];
  const _kpiDefs = [
    { id: 'new_revenue', card: metricCard(_kpiLabels.new_revenue || 'New Revenue this Period', fmt.currency(totalNewRevenue), 'From all pipelines', wowTotalNewRev) },
    { id: 'mrr',         card: metricCard(_kpiLabels.mrr || 'MRR This Month', fmt.currency(mrr), _mrrSubtitle, wowMrr) },
    { id: 'total_rev',   card: metricCard(_kpiLabels.total_rev || 'Total Revenue This Month', fmt.currency(mtdRevenue), mtdLabel, wowMtd) },
    { id: 'leads',       card: metricCard(_kpiLabels.leads || 'Total New Leads', fmt.int(totalLeads), 'Across all entities', wowTotalLeads) },
    { id: 'ad_spend',    card: metricCard(_kpiLabels.ad_spend || 'Total Ad Spend', fmt.currency(totalSpend), 'Google + Meta', wowSpend) },
  ];
  html += `<div class="exec-kpi-grid">`;
  _kpiDefs.forEach((def, i) => {
    if (!_hiddenKpis.includes(i)) {
      def.card.setAttribute('data-kpi', def.id);
      html += def.card.outerHTML.replace('metric-card', 'metric-card exec-kpi');
    }
  });
  html += `</div>`;

  // Entity scorecard table
  html += `<table class="exec-scorecard">`;
  html += `<thead><tr>
    <th>Entity</th>
    <th>Leads this Period</th>
    <th>Leads vs Prev</th>
    <th>Ad Spend</th>
    <th>Revenue</th>
  </tr></thead>`;
  html += `<tbody>`;

  rows.forEach(r => {
    const accent = getAccent(r.cfg);
    // Leads vs prev cell
    let wowHtml;
    if (r.wowLeads === 0) {
      wowHtml = '<span class="wow-cell wow-flat">—</span>';
    } else if (r.wowLeads === Infinity) {
      wowHtml = '<span class="wow-cell wow-up">&#9650; New</span>';
    } else if (r.wowLeads > 0) {
      wowHtml = `<span class="wow-cell wow-up">&#9650; ${Math.abs(r.wowLeads * 100).toFixed(0)}%</span>`;
    } else {
      wowHtml = `<span class="wow-cell wow-down">&#9660; ${Math.abs(r.wowLeads * 100).toFixed(0)}%</span>`;
    }

    // Per-entity ROAS — hidden until attribution is sorted out
    // const entityROAS = (r.rev && r.spend) ? (r.rev / r.spend).toFixed(2) + 'x' : '<span style="opacity:.4">—</span>';

    const ddId = `exec-dd-${r.cfg.key}`;

    // Nerra Dining: show guest count with "(guests)" notation, no dropdown
    let leadsCell;
    if (r.cfg.isToast) {
      leadsCell = r.nl > 0
        ? `${fmt.int(r.nl)} <span style="opacity:.55;font-size:.85em">(guests)</span>`
        : '<span style="opacity:.4">0</span>';
    } else if (r.cfg.isGhost) {
      leadsCell = r.nl > 0
        ? `${fmt.int(r.nl)} <span style="opacity:.55;font-size:.85em">(subscribers)</span>`
        : '<span style="opacity:.4">0</span>';
    } else if (r.cfg.key === 'smashing_boxes') {
      // Smashing Boxes: split into Leads with No Deal / Leads with Deals
      const contactLeads = r.leads.filter(l => l._source === 'contact');
      const dealLeads    = r.leads.filter(l => l._source !== 'contact');
      const leadCount = r.leads.length;
      if (leadCount > 0) {
        function _execSplitDd(id, label, subset) {
          const count = subset.length;
          const items = count === 0
            ? '<div class="exec-leads-item" style="color:#999;font-style:italic;cursor:default">None this period</div>'
            : subset.map((l, i) => `<div class="exec-leads-item" data-lead-idx="${i}">${_leadItemLabel(l, r.statusField)}</div>`).join('');
          return `<div style="text-align:center">
            <div class="exec-split-label">${label}</div>
            <div class="exec-leads-dd" id="${id}">
              <button class="exec-leads-btn" ${count === 0 ? 'disabled style="opacity:.5;cursor:default"' : ''}>${count}
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
              </button>
              <div class="exec-leads-list">${items}</div>
            </div>
          </div>`;
        }
        leadsCell = `<div class="exec-leads-split">
          ${_execSplitDd(ddId + '-nodeal', 'No Deal', contactLeads)}
          ${_execSplitDd(ddId + '-deal', 'With Deals', dealLeads)}
        </div>`;
      } else {
        leadsCell = `<span style="opacity:.4">${fmt.int(r.nl)}</span>`;
      }
    } else {
      // Sort leads by status for Events at 506 and Nerra Catering
      if (r.cfg.key === 'events_506' || r.cfg.key === 'catering') {
        const _statusOrder = { 'new': 0, 'contacted': 1, 'proposal sent': 2, 'tentative': 3, 'booked': 4 };
        r.leads.sort((a, b) => (_statusOrder[(a[r.statusField]||'').toLowerCase()] ?? 99) - (_statusOrder[(b[r.statusField]||'').toLowerCase()] ?? 99));
      }
      const leadCount = r.leads.length;
      const ddItemsHtml = leadCount === 0
        ? '<div class="exec-leads-item" style="color:#999;font-style:italic;cursor:default">No leads this period</div>'
        : r.leads.map((l, i) =>
            `<div class="exec-leads-item" data-lead-idx="${i}">${_leadItemLabel(l, r.statusField)}</div>`
          ).join('');
      leadsCell = leadCount > 0
        ? `<div class="exec-leads-dd" id="${ddId}">
             <button class="exec-leads-btn">${fmt.int(r.nl)}
               <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
             </button>
             <div class="exec-leads-list">${ddItemsHtml}</div>
           </div>`
        : `<span style="opacity:.4">${fmt.int(r.nl)}</span>`;
    }

    html += `<tr data-exec-key="${r.cfg.key}">
      <td><span class="entity-dot" style="background:${accent}"></span><span class="entity-name">${r.cfg.label}</span></td>
      <td>${leadsCell}</td>
      <td>${wowHtml}</td>
      <td>${r.spend > 0 ? fmt.currency(r.spend) : '<span style="opacity:.4">—</span>'}</td>
      <td>${r.rev > 0 ? fmt.currency(r.rev) : '<span style="opacity:.4">—</span>'}</td>
    </tr>`;
  });

  html += `</tbody></table>`;
  section.innerHTML = html;

  // Wire up executive summary lead dropdowns
  function _wireExecDd(container, leadsArr, modalFn) {
    if (!container) return;
    const btn = container.querySelector('.exec-leads-btn');
    const list = container.querySelector('.exec-leads-list');
    if (!btn || !list) return;
    btn.addEventListener('click', e => {
      e.stopPropagation();
      section.querySelectorAll('.exec-leads-list.open').forEach(l => { if (l !== list) l.classList.remove('open'); });
      list.classList.toggle('open');
    });
    list.addEventListener('click', e => {
      const item = e.target.closest('[data-lead-idx]');
      if (!item) return;
      list.classList.remove('open');
      const idx = parseInt(item.dataset.leadIdx, 10);
      if (leadsArr[idx]) modalFn(leadsArr[idx]);
    });
  }
  rows.forEach(r => {
    const ddId = `exec-dd-${r.cfg.key}`;
    if (r.cfg.key === 'smashing_boxes') {
      // Split dropdowns: wire each separately with their own subset
      const contactLeads = r.leads.filter(l => l._source === 'contact');
      const dealLeads    = r.leads.filter(l => l._source !== 'contact');
      _wireExecDd(section.querySelector(`#${ddId}-nodeal`), contactLeads, r.modalFn);
      _wireExecDd(section.querySelector(`#${ddId}-deal`), dealLeads, r.modalFn);
    } else {
      _wireExecDd(section.querySelector(`#${ddId}`), r.leads, r.modalFn);
    }
  });

  return section;
}

// ── Draw SEO sparkline trend charts ──────────────────────────────────────────
document.querySelectorAll('.seo-trend-canvas').forEach(canvas => {
  const daily = JSON.parse(canvas.dataset.daily || '[]');
  const color = canvas.dataset.color || '#555';
  if (daily.length < 2) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  ctx.scale(dpr, dpr);

  const vals = daily.map(d => d.sessions);
  const max = Math.max(...vals);
  const min = Math.min(...vals);
  const range = max - min || 1;
  const pad = 8;
  const plotW = w - pad * 2;
  const plotH = h - pad * 2;

  const pts = vals.map((v, i) => ({
    x: pad + (i / (vals.length - 1)) * plotW,
    y: pad + plotH - ((v - min) / range) * plotH,
  }));

  // Fill
  ctx.beginPath();
  ctx.moveTo(pts[0].x, h);
  pts.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.lineTo(pts[pts.length - 1].x, h);
  ctx.closePath();
  ctx.fillStyle = color + '18';
  ctx.fill();

  // Line
  ctx.beginPath();
  pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // Dots
  pts.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
  });

  // Labels (first & last)
  ctx.font = '600 10px DM Sans, sans-serif';
  ctx.fillStyle = '#555';
  ctx.textAlign = 'left';
  ctx.fillText(vals[0], pts[0].x, pts[0].y - 8);
  ctx.textAlign = 'right';
  ctx.fillText(vals[vals.length - 1], pts[pts.length - 1].x, pts[pts.length - 1].y - 8);
});
