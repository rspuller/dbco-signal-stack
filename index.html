<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Durham Bottling Company — Signal Stack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Theme variables ──────────────────────────────────────────────── */
:root {
  /* ── Brand foundation ──────────────────────────────────── */
  --brand-primary: #0C2340;
  --brand-accent:  #C87D3A;
  --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;

  /* ── Surfaces ──────────────────────────────────────────── */
  --bg:             #F5F0E8;   /* cream — brand page background */
  --text:           #0C2340;   /* deep navy */
  --text-secondary: #374151;
  --text-muted:     #6B7280;
  --text-faint:     #9CA3AF;
  --text-faintest:  #D1D5DB;
  --card-bg:        #FFFFFF;
  --card-shadow:    0 1px 2px 0 rgb(0 0 0 / 0.05);
  --border:         #DCD3C4;   /* cream-tinted hairline */
  --border-strong:  #C8BFB4;
  --border-divider: #DCD3C4;
  --border-dashed:  #DCD3C4;
  --hover-bg:       #F5F0E8;
  --pill-bg:        #EBE5DA;
  --chip-text:      #0C2340;
  --term-bg:        #EFE9DD;
  --term-conv-bg:   #DCFCE7;
  --term-neg-bg:    #FEE2E2;
  --exec-kpi-bg:    #EBE5DA;
  --canvas-bg:      #F5F0E8;
  --header-bg:      #0C2340;   /* brand navy — perfect for header */
  --header-text:    #FFFFFF;
  --header-meta:    rgba(255,255,255,.55);
  --modal-overlay:  rgba(12,35,64,.45);
  --modal-bg:       #FFFFFF;
  --dropdown-bg:    #FFFFFF;
  --dropdown-border:#DCD3C4;
  --dropdown-shadow:0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
  --nvr-new-bg:     #DBEAFE;
  --nvr-new-text:   #1E40AF;
  --nvr-ret-bg:     #FEF3C7;
  --nvr-ret-text:   #92400E;
  --warn-bg:        #FEF3C7;
  --warn-border:    #D97706;
  --warn-text:      #92400E;
  --campaign-total: #0C2340;
  --toggle-bg:      #DCD3C4;
  --toggle-knob:    #FFFFFF;

  /* ── Semantic status tokens ────────────────────────────── */
  --clr-high:          #DC2626;
  --clr-high-bg:       #FEE2E2;
  --clr-high-text:     #991B1B;
  --clr-medium:        #D97706;
  --clr-medium-bg:     #FEF3C7;
  --clr-medium-text:   #92400E;
  --clr-low:           #2563EB;
  --clr-low-bg:        #DBEAFE;
  --clr-low-text:      #1E40AF;
  --clr-success:       #16A34A;
  --clr-success-text:  #16A34A;
  --clr-success-bg:    #DCFCE7;
  --clr-success-strong:#166534;

  /* ── Chart / entity sequence ───────────────────────────── */
  --chart-1: #0C2340;   /* Navy      — Events at 506      */
  --chart-2: #C87D3A;   /* Gold      — Nerra Catering     */
  --chart-3: #2A8C8C;   /* Teal      — Private Office     */
  --chart-4: #E0A82E;   /* Mustard   — Oak & Glow         */
  --chart-5: #D97A4A;   /* Terracotta— Smashing Boxes     */

  /* ── Radii ─────────────────────────────────────────────── */
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 10px;
  --radius-xl: 14px;

  /* ── Shadows ───────────────────────────────────────────── */
  --shadow-card:      0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow-elevated:  0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
  --shadow-modal:     0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
}
[data-theme="dark"] {
  --bg:             #0F1A2A;
  --text:           #E8EDF5;
  --text-secondary: #B8C4D4;
  --text-muted:     #8A9BB0;
  --text-faint:     #6B7A8F;
  --text-faintest:  #4A5568;
  --card-bg:        #162032;
  --card-shadow:    0 1px 4px rgb(0 0 0 / 0.4);
  --border:         #1E3050;
  --border-strong:  #243660;
  --border-divider: #1E3050;
  --border-dashed:  #1E3050;
  --hover-bg:       #1A2A40;
  --pill-bg:        #1E3050;
  --chip-text:      #B8C4D4;
  --term-bg:        #162032;
  --term-conv-bg:   #0D2B1A;
  --term-neg-bg:    #2A1215;
  --exec-kpi-bg:    #1A2A40;
  --canvas-bg:      #0F1A2A;
  --header-bg:      #060F1C;
  --header-text:    #E8EDF5;
  --header-meta:    rgba(232,237,245,.45);
  --modal-overlay:  rgba(0,0,0,.7);
  --modal-bg:       #162032;
  --dropdown-bg:    #162032;
  --dropdown-border:#1E3050;
  --dropdown-shadow:0 4px 6px -1px rgb(0 0 0 / 0.4);
  --nvr-new-bg:     #1E3A5F;
  --nvr-new-text:   #93C5FD;
  --nvr-ret-bg:     #422006;
  --nvr-ret-text:   #FCD34D;
  --warn-bg:        #2D1F00;
  --warn-border:    #92400E;
  --warn-text:      #FCD34D;
  --campaign-total: #B8C4D4;
  --toggle-bg:      #1E3050;
  --toggle-knob:    #E8EDF5;
  /* ── Semantic status tokens (dark) ─────────────────────── */
  --clr-high-bg:       #2A1215;
  --clr-high-text:     #FCA5A5;
  --clr-medium-bg:     #2D1F00;
  --clr-medium-text:   #FCD34D;
  --clr-low-bg:        #1E3560;
  --clr-low-text:      #93C5FD;
  --clr-success:       #4ADE80;
  --clr-success-text:  #4ADE80;
  --clr-success-bg:    #052E16;
  --clr-success-strong:#4ADE80;
}

/* ── Reset & base ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  font-size: 0.875rem;
  line-height: 1.5;
  transition: background .3s, color .3s;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── Site header ──────────────────────────────────────────────────── */
.site-header {
  background: var(--header-bg);
  color: var(--header-text);
  padding: 1.5rem 2rem;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: .75rem 1rem;
}
.site-header h1 {
  font-size: 1.375rem;
  font-weight: 700;
  letter-spacing: -.02em;
  flex: 1;
  min-width: 160px;
}
/* Controls group: selects row + date text stacked */
.header-controls {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: .3rem;
}
.header-selects {
  display: flex;
  align-items: center;
  gap: .5rem;
  flex-wrap: wrap;
}
/* Date / generated text beneath the selects */
.header-meta {
  font-size: .8125rem;
  color: var(--header-meta);
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: .15rem;
}
/* Theme toggle + PDF export grouped together */
.header-actions {
  display: flex;
  align-items: center;
  gap: .5rem;
  flex-shrink: 0;
}

/* ── Preset picker ───────────────────────────────────────────────── */
.preset-picker {
  background: rgba(255,255,255,.12);
  color: #fff;
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 6px;
  padding: .4rem .8rem;
  font-family: inherit;
  font-size: .8125rem;
  cursor: pointer;
  outline: none;
}
.preset-picker:hover {
  background: rgba(255,255,255,.18);
}
.preset-picker option {
  background: #1e1d1b;
  color: #fff;
}
.preset-picker.hidden { display: none; }
.entity-multiselect.hidden { display: none; }

/* ── Multi-select entity filter ─────────────────────────────────── */
.entity-multiselect { position: relative; display: inline-block; }
.entity-multiselect-btn { appearance: none; -webkit-appearance: none; display: flex; align-items: center; gap: .4rem; }
.entity-ms-arrow { font-size: .6rem; opacity: .7; transition: transform .15s; }
.entity-multiselect.open .entity-ms-arrow { transform: rotate(180deg); }
.entity-multiselect-panel {
  display: none;
  position: absolute;
  top: calc(100% + 5px);
  right: 0;
  min-width: 230px;
  background: var(--card-bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: 0 4px 20px rgba(0,0,0,.2);
  padding: 4px 0;
  z-index: 500;
}
[data-theme="dark"] .entity-multiselect-panel { box-shadow: 0 4px 20px rgba(0,0,0,.5); }
.entity-multiselect.open .entity-multiselect-panel { display: block; }
.entity-checkbox-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 6px 14px;
  cursor: pointer;
  font-size: .8125rem;
  white-space: nowrap;
  color: var(--text);
  user-select: none;
}
.entity-checkbox-item:hover { background: rgba(0,0,0,.04); }
[data-theme="dark"] .entity-checkbox-item:hover { background: rgba(255,255,255,.06); }
.entity-checkbox-item input[type="checkbox"] {
  cursor: pointer;
  accent-color: #EA4800;
  width: 14px; height: 14px;
  flex-shrink: 0;
  margin: 0;
}
.entity-checkbox-divider { border-top: 1px solid var(--border); margin: 4px 0; }

.custom-range-panel {
  display: flex;
  align-items: center;
  gap: .4rem;
  margin-top: .25rem;
}
.custom-range-panel.hidden { display: none; }
.custom-date-input {
  background: rgba(255,255,255,.12);
  color: #fff;
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 5px;
  padding: .3rem .5rem;
  font-family: inherit;
  font-size: .75rem;
  outline: none;
  cursor: pointer;
  min-width: 90px;
  text-align: center;
}
.custom-date-input:hover { border-color: rgba(255,255,255,.4); }
.custom-range-sep { color: rgba(255,255,255,.6); font-size: .75rem; }
.cal-wrap { position: relative; display: inline-block; }
.cal-popup {
  display: none; position: absolute; top: calc(100% + 4px); left: 50%; transform: translateX(-50%);
  background: #1e1e1e; border: 1px solid rgba(255,255,255,.2); border-radius: 8px;
  padding: .5rem; z-index: 2000; box-shadow: 0 8px 24px rgba(0,0,0,.5);
  min-width: 220px; font-size: .75rem; color: #fff; user-select: none;
}
.cal-popup.open { display: block; }
.cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: .4rem; }
.cal-nav button {
  background: none; border: none; color: #fff; cursor: pointer; font-size: .85rem;
  padding: .15rem .4rem; border-radius: 4px;
}
.cal-nav button:hover { background: rgba(255,255,255,.15); }
.cal-nav button:disabled { opacity: .25; cursor: default; }
.cal-nav button:disabled:hover { background: none; }
.cal-nav span { font-weight: 600; font-size: .8rem; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; text-align: center; }
.cal-grid .cal-hdr { font-size: .65rem; color: rgba(255,255,255,.45); padding: .15rem 0; }
.cal-grid .cal-day {
  padding: .25rem 0; border-radius: 4px; cursor: pointer; font-size: .75rem;
}
.cal-grid .cal-day:hover { background: rgba(255,255,255,.15); }
.cal-grid .cal-day.disabled { color: rgba(255,255,255,.2); cursor: default; }
.cal-grid .cal-day.disabled:hover { background: none; }
.cal-grid .cal-day.selected { background: rgba(255,255,255,.25); font-weight: 700; }
.cal-grid .cal-day.other-month { color: rgba(255,255,255,.15); }
.custom-apply-btn {
  background: rgba(255,255,255,.18);
  color: #fff;
  border: 1px solid rgba(255,255,255,.25);
  border-radius: 5px;
  padding: .3rem .7rem;
  font-family: inherit;
  font-size: .75rem;
  font-weight: 600;
  cursor: pointer;
}
.custom-apply-btn:hover { background: rgba(255,255,255,.28); }

/* ── Theme toggle ────────────────────────────────────────────────── */
.theme-toggle {
  display: flex; align-items: center; gap: .5rem;
  cursor: pointer; user-select: none;
  font-size: .75rem; color: var(--header-meta);
}
.theme-toggle-track {
  width: 36px; height: 20px;
  background: var(--toggle-bg);
  border-radius: 20px;
  position: relative;
  transition: background .3s;
}
.theme-toggle-knob {
  width: 16px; height: 16px;
  background: var(--toggle-knob);
  border-radius: 50%;
  position: absolute;
  top: 2px; left: 2px;
  transition: transform .3s;
}
[data-theme="dark"] .theme-toggle-knob { transform: translateX(16px); }
.theme-toggle-icon { font-size: .9rem; line-height: 1; }

/* ── Container ────────────────────────────────────────────────────── */
.container { max-width: 960px; margin: 0 auto; padding: 1.75rem 1.25rem 3rem; }

/* ── Accordion ────────────────────────────────────────────────────── */
.accordion { border-radius: var(--radius-xl); overflow: hidden; box-shadow: var(--shadow-card); border: 1px solid var(--border); margin-bottom: 1rem; background: var(--card-bg); }
.accordion.open { overflow: visible; }

.acc-header {
  display: flex;
  align-items: center;
  gap: .75rem;
  padding: .9rem 1.25rem;
  cursor: pointer;
  user-select: none;
  background: var(--card-bg);
  border: none;
  width: 100%;
  text-align: left;
  transition: background .15s;
  border-left: 4px solid transparent;
  color: var(--text);
}
.acc-header:hover { background: var(--hover-bg); }
.accordion.open .acc-header { border-left-color: var(--accent); }

.swatch {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
  background: var(--accent);
}
.acc-name { font-weight: 600; font-size: 1.125rem; flex: 1; letter-spacing: -.01em; }

.pills { display: flex; gap: .35rem; flex-wrap: wrap; }
.pill {
  font-size: 0.75rem; font-weight: 500; letter-spacing: .04em; text-transform: uppercase;
  padding: .125rem .5rem; border-radius: var(--radius-sm);
  background: var(--pill-bg); color: var(--text-muted);
  border: 1px solid var(--border);
}

.chips { display: flex; gap: .5rem; flex-wrap: wrap; }
.chip {
  font-size: .75rem; font-weight: 500;
  padding: .2rem .6rem; border-radius: 6px;
  background: var(--metric-bg); color: var(--chip-text);
}

.spend-badge {
  font-weight: 700; font-size: .9375rem;
  white-space: nowrap;
}

.chevron {
  width: 18px; height: 18px; flex-shrink: 0;
  color: var(--text-faintest);
  transition: transform .25s;
}
.accordion.open .chevron { transform: rotate(180deg); }

/* ── Accordion body ───────────────────────────────────────────────── */
.acc-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height .35s ease;
}
.acc-body-inner {
  padding: 1.25rem 1.5rem 1.5rem;
  border-top: 1px solid var(--border);
}

/* ── Warning box ──────────────────────────────────────────────────── */
.warning-box {
  background: var(--warn-bg);
  border: 1px solid var(--warn-border);
  border-radius: 8px;
  padding: .65rem 1rem;
  font-size: .8125rem;
  color: var(--warn-text);
  margin-bottom: 1rem;
}

/* ── At-a-glance metric cards ─────────────────────────────────────── */
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: .65rem;
  margin-bottom: 1.25rem;
}
.metric-card {
  background: var(--metric-bg);
  border-radius: var(--radius-md);
  padding: .875rem 1rem;
  border: 1px solid var(--border);
}
.metric-label { font-size: .6875rem; font-weight: 500; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); margin-bottom: .3rem; }
.metric-value { font-size: 1.5rem; font-weight: 700; color: var(--text); letter-spacing: -.02em; line-height: 1.1; }
.metric-sub   { font-size: .75rem; color: var(--text-muted); margin-top: .2rem; }
.metric-wow   { font-size: .6875rem; font-weight: 600; margin-top: .2rem; }
.metric-wow.up   { color: var(--clr-success-text); }
.metric-wow.down { color: var(--clr-high-text); }
.metric-wow.flat { color: var(--text-muted); }

/* ── Executive Summary ────────────────────────────────────────────── */
.exec-summary {
  background: var(--card-bg);
  border-radius: var(--radius-xl);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-card);
  padding: 1.5rem 1.75rem 1.25rem;
  margin-bottom: 1.75rem;
}
.exec-summary-title {
  font-size: 1.0625rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: .1rem;
}
.exec-summary-subtitle {
  font-size: .8rem;
  font-weight: 500;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 1rem;
}
.exec-kpi-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: .65rem;
  margin-bottom: 1.25rem;
}
.exec-kpi {
  background: var(--exec-kpi-bg);
  border-radius: 8px;
  padding: .75rem 1rem;
}
.exec-kpi .metric-label { color: var(--text-muted); }
.exec-kpi .metric-value { font-size: 1.625rem; }

.exec-scorecard {
  width: 100%;
  border-collapse: collapse;
  font-size: .8125rem;
}
.exec-scorecard thead th {
  font-size: .6875rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-muted);
  background: var(--pill-bg);
  text-align: left;
  padding: .4rem .6rem;
  border-bottom: 1px solid var(--border);
}
.exec-scorecard thead th:not(:first-child) { text-align: right; }
.exec-scorecard tbody td {
  padding: .55rem .6rem;
  border-bottom: 1px solid var(--border);
}
.exec-scorecard tbody td:not(:first-child) {
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.exec-scorecard .entity-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: .4rem;
  vertical-align: middle;
}
.exec-scorecard .entity-name {
  font-weight: 600;
  color: var(--text);
}
.exec-scorecard .wow-cell { font-weight: 600; font-size: .75rem; }
.exec-scorecard .wow-up   { color: var(--clr-success-text); }
.exec-scorecard .wow-down { color: var(--clr-high-text); }
.exec-scorecard .wow-flat { color: var(--text-faintest); }
.exec-scorecard .exec-leads-dd { position: relative; display: inline-block; }
.exec-scorecard .exec-leads-btn {
  background: none; border: 1px solid transparent; border-radius: 6px;
  color: var(--accent, var(--text)); font-weight: 700; font-size: inherit;
  cursor: pointer; padding: 2px 6px; display: inline-flex; align-items: center; gap: 4px;
  transition: border-color .15s;
}
.exec-scorecard .exec-leads-btn:hover { border-color: var(--accent, rgba(255,255,255,.3)); }
.exec-scorecard .exec-leads-btn svg { width: 12px; height: 12px; color: var(--text-faint); flex-shrink: 0; }
.exec-scorecard .exec-leads-list {
  display: none; position: absolute; right: 0; top: 100%; z-index: 999;
  background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px;
  min-width: 320px; max-height: 260px; overflow-y: auto; box-shadow: 0 6px 20px rgba(0,0,0,.3);
  white-space: nowrap;
}
.exec-scorecard .exec-leads-list.open { display: block; }
.exec-scorecard .exec-leads-item {
  padding: 6px 12px; font-size: .8rem; cursor: pointer;
  border-bottom: 1px solid var(--border); color: var(--text);
}
.exec-scorecard .exec-leads-item:last-child { border-bottom: none; }
.exec-scorecard .exec-leads-item:hover { background: var(--metric-bg); color: var(--accent); }
.exec-scorecard .exec-leads-split {
  display: flex; gap: .75rem; align-items: flex-start;
}
.exec-scorecard .exec-leads-split .exec-leads-dd { display: inline-block; }
.exec-scorecard .exec-leads-split .exec-split-label {
  font-size: .65rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em;
  color: var(--text-faint); margin-bottom: 2px; white-space: nowrap;
}

/* ── Section date range label ─────────────────────────────────────── */
.section-date-range {
  font-size: .8rem;
  font-weight: 400;
  color: var(--text-faint);
  margin-left: .5rem;
}

/* ── Platform sections ────────────────────────────────────────────── */
.platform-section { margin-bottom: 1.25rem; }
.platform-label {
  font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
  color: var(--accent);
  margin-bottom: .5rem;
  padding-bottom: .3rem;
  border-bottom: 1px solid var(--border);
}
.campaign-name {
  font-size: .72rem; font-weight: 600; color: var(--text-secondary);
  padding: .45rem 0 .2rem;
  border-top: 1px dashed var(--border-dashed);
  margin-top: .35rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.campaign-name:first-of-type { border-top: none; margin-top: 0; }
.campaign-total {
  font-style: italic; color: var(--campaign-total);
  border-top: 1px solid var(--border-strong);
  margin-top: .5rem; padding-top: .5rem;
}
.platform-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: .5rem;
}
.prow-item { font-size: .8125rem; }
.prow-item strong { display: block; font-weight: 700; }
.prow-item span   { color: var(--text-muted); font-size: .75rem; }

/* ── Search terms ─────────────────────────────────────────────────── */
.search-terms-section { margin-top: .5rem; }
.search-terms-section h4 {
  font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
  color: var(--text-secondary); margin-bottom: .65rem;
}
.search-terms-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.term-list { list-style: none; }
.term-list li {
  display: flex; align-items: center; justify-content: space-between;
  padding: .35rem .5rem;
  border-radius: 5px;
  font-size: .8rem;
  margin-bottom: .25rem;
  background: var(--term-bg);
}
.term-list li.converted { background: var(--term-conv-bg); }
.term-list li.negative  { background: var(--term-neg-bg); }
.term-name { flex: 1; margin-right: .5rem; word-break: break-word; }
.term-meta { font-size: .7rem; color: var(--text-muted); white-space: nowrap; }
.term-list li.converted .term-name { color: #15803d; }
.term-list li.negative  .term-name { color: #b91c1c; }

/* ── Inline rec signals (top of paid-ads body) ───────────────────── */
.inline-recs {
  margin-top: 1rem;
  padding-top: .75rem;
  border-top: 1px solid var(--border);
}
.inline-recs-label {
  font-size: .68rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .07em; color: var(--text-muted); margin-bottom: .45rem;
}
.inline-recs .rec-item { margin-bottom: .4rem; }
.inline-recs .rec-item:last-child { margin-bottom: 0; }
/* rec-detail is intentionally hidden inline; only visible in the full modal */
.inline-recs .rec-detail { display: none; }

/* ── Insights tables (top keywords / top ads) ─────────────────────── */
.insights-section { margin-top: 1rem; }
.insights-table { width: 100%; border-collapse: collapse; font-size: .8rem; }
.insights-table th {
  text-align: left; font-weight: 600; font-size: .7rem; text-transform: uppercase;
  letter-spacing: .05em; color: var(--text-muted);
  padding: .25rem .5rem; border-bottom: 1px solid var(--border);
}
.insights-table td {
  padding: .3rem .5rem; border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.insights-table tr:last-child td { border-bottom: none; }
.insights-table td:first-child { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ins-metric { text-align: right; }
.ins-badge-ctr { font-size: .72rem; font-weight: 700; color: var(--accent, #6366f1); }

/* ── Summary table ────────────────────────────────────────────────── */
.summary-table { width: 100%; border-collapse: collapse; font-size: .8375rem; }
.summary-table th {
  text-align: left; font-weight: 600; font-size: .75rem; text-transform: uppercase;
  letter-spacing: .06em; color: var(--text-muted); background: var(--pill-bg);
  padding: .5rem .75rem; border-bottom: 1px solid var(--border);
}
.summary-table td { padding: .6rem .75rem; border-bottom: 1px solid var(--border); }
.summary-table tr:last-child td { border-bottom: none; }
.summary-table .num { text-align: right; font-variant-numeric: tabular-nums; }
.summary-table tr.entity-row td:first-child {
  border-left: 3px solid var(--accent);
  padding-left: .625rem;
}
.summary-footnote { font-size: .75rem; color: var(--text-muted); margin-top: .5rem; }

/* ── Empty state ──────────────────────────────────────────────────── */
.empty-state {
  font-size: .875rem; color: var(--text-faint); font-style: italic;
  padding: .5rem 0;
}

/* ── Tripleseat leads section ─────────────────────────────────────── */
.leads-section {
  margin-top: 1.25rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
}
.leads-header {
  display: flex;
  align-items: center;
  gap: .75rem;
  margin-bottom: .75rem;
}
.leads-split-wrapper {
  display: flex; gap: 1.5rem; flex-wrap: wrap;
}
.leads-split-wrapper > .leads-section {
  flex: 1 1 45%; min-width: 280px; border-top: none; padding-top: 0;
}
.leads-label {
  font-size: .75rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--accent);
}
.leads-count-badge {
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--accent); color: #fff;
  font-size: .75rem; font-weight: 700;
  padding: .15rem .55rem; border-radius: 100px;
  min-width: 1.5rem;
}

/* custom dropdown */
.leads-dropdown { position: relative; display: inline-block; }
.leads-dropdown-btn {
  display: flex; align-items: center; gap: .4rem;
  background: var(--card-bg); border: 1px solid var(--border-strong); border-radius: 7px;
  padding: .4rem .75rem; font-size: .8125rem; font-family: inherit;
  cursor: pointer; color: var(--text); white-space: nowrap;
  transition: border-color .15s;
}
.leads-dropdown-btn:hover { border-color: var(--accent); }
.leads-dropdown-btn svg { width: 14px; height: 14px; color: var(--text-faint); flex-shrink: 0; }
.leads-dropdown-list { /* funnel section */
  position: absolute; top: 100%; left: 0; margin-top: .25rem;
  background: var(--dropdown-bg); border: 1px solid var(--dropdown-border); border-radius: 8px;
  box-shadow: 0 4px 16px var(--dropdown-shadow);
  min-width: 320px; max-height: 260px; overflow-y: auto;
  z-index: 1000; display: none; white-space: nowrap;
}
.leads-dropdown-list.open { display: block; }
.leads-dropdown-item {
  padding: .5rem .85rem; font-size: .8125rem; cursor: pointer;
  border-bottom: 1px solid var(--border); transition: background .1s;
}
.leads-dropdown-item:last-child { border-bottom: none; }
.leads-dropdown-item:hover { background: var(--metric-bg); color: var(--accent); }

/* lead modal */
.lead-modal-overlay {
  position: fixed; inset: 0;
  background: var(--modal-overlay);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 1rem;
}
.lead-modal-box {
  background: var(--modal-bg); border-radius: 12px;
  box-shadow: 0 8px 40px var(--card-shadow);
  padding: 1.75rem 2rem;
  width: 100%; max-width: 440px;
  position: relative;
  font-family: 'DM Sans', system-ui, sans-serif;
}
.lead-modal-close {
  position: absolute; top: 1rem; right: 1rem;
  background: none; border: none; cursor: pointer;
  font-size: 1.1rem; color: #aaa; line-height: 1;
}
.lead-modal-close:hover { color: var(--text); }
.lead-modal-title {
  font-size: 1.0625rem; font-weight: 700; margin-bottom: 1.1rem;
  padding-right: 1.5rem; color: var(--text);
}
.lead-modal-fields { display: grid; grid-template-columns: auto 1fr; gap: .45rem .75rem; align-items: baseline; }
.lead-modal-key {
  font-size: .7rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: var(--text-muted); white-space: nowrap;
}
.lead-modal-val { font-size: .875rem; color: var(--text); word-break: break-word; }

/* ── SEO section ──────────────────────────────────────────────────── */
.section-divider {
  border: none; border-top: 2px solid var(--border-divider);
  margin: 2rem 0 1.5rem;
}
.section-heading {
  font-size: 1.0625rem; font-weight: 700; letter-spacing: -.01em;
  color: var(--text); margin-bottom: 1rem;
}
.seo-organic-label {
  font-size: .75rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--accent);
  margin: 0 0 .5rem;
  padding-bottom: .3rem;
  border-bottom: 1px solid var(--border);
}
.seo-conv-row {
  display: flex; align-items: center; gap: 1.5rem;
  padding: .75rem 0;
  border-top: 1px solid var(--border);
  margin-top: .25rem;
}
.seo-conv-item { font-size: .875rem; }
.seo-conv-item strong { font-weight: 700; font-size: 1.05rem; }
.seo-conv-item span   { color: var(--text-muted); font-size: .75rem; display: block; }
.seo-st-label {
  font-size: .75rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--text-secondary);
  margin: 1rem 0 .5rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
}

/* ── SEO enhanced sections ───────────────────────────────────────── */
.seo-section-label {
  font-size: .75rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--accent, #555);
  margin: 1.25rem 0 .5rem;
  padding-top: .75rem;
  border-top: 1px solid var(--border);
}
.seo-section-label:first-child { border-top: none; margin-top: 0; padding-top: 0; }
.seo-trend-canvas {
  width: 100%; height: 80px; margin: .5rem 0;
  border-radius: 6px; background: var(--canvas-bg);
}
.seo-change-row {
  display: flex; gap: 1.5rem; flex-wrap: wrap;
  margin-bottom: .5rem;
}
.seo-change-item {
  font-size: .85rem;
}
.seo-change-item .change-val {
  font-weight: 700; font-size: 1rem;
}
.seo-change-item .change-val.up   { color: #15803d; }
.seo-change-item .change-val.down { color: #b91c1c; }
.seo-change-item .change-label {
  color: var(--text-muted); font-size: .7rem; display: block;
}
.seo-lp-table {
  width: 100%; border-collapse: collapse; font-size: .8125rem;
  margin-top: .25rem;
}
.seo-lp-table th {
  text-align: left; font-weight: 600; font-size: .7rem; text-transform: uppercase;
  letter-spacing: .06em; color: var(--text-muted); padding: .4rem .5rem;
  border-bottom: 2px solid var(--border-strong);
}
.seo-lp-table th:last-child { text-align: right; }
.seo-lp-table td { padding: .4rem .5rem; border-bottom: 1px solid var(--border); }
.seo-lp-table td:last-child { text-align: right; font-variant-numeric: tabular-nums; }
.seo-lp-table tr:last-child td { border-bottom: none; }
.seo-nvr-bar {
  display: flex; height: 24px; border-radius: 4px; overflow: hidden;
  margin: .5rem 0; font-size: .7rem; font-weight: 600;
}
.seo-nvr-bar .new { background: var(--nvr-new-bg); color: var(--nvr-new-text); display: flex; align-items: center; justify-content: center; }
.seo-nvr-bar .ret { background: var(--nvr-ret-bg); color: var(--nvr-ret-text); display: flex; align-items: center; justify-content: center; }
.seo-nvr-legend {
  display: flex; gap: 1.25rem; font-size: .8rem; margin-top: .25rem;
}
.seo-nvr-legend span { font-weight: 600; }
.seo-gsc-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: .5rem; margin-top: .25rem;
}
.seo-query-table th:nth-child(2),
.seo-query-table th:nth-child(3) { text-align: right; }
.seo-query-table td:nth-child(2),
.seo-query-table td:nth-child(3) { text-align: right; font-variant-numeric: tabular-nums; }
.seo-query-table td:first-child { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.seo-show-more-btn {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  color: var(--text-faint); font-size: .75rem; padding: .3rem .8rem;
  cursor: pointer; transition: border-color .15s, color .15s;
}
.seo-show-more-btn:hover { border-color: var(--accent, #888); color: var(--text); }

/* ── Collapsible top-level sections ───────────────────────────────── */
.section-toggle {
  display: flex;
  align-items: center;
  gap: .5rem;
  cursor: pointer;
  user-select: none;
  padding: .25rem 0;
  margin-bottom: 1rem;
}
.section-toggle h2 { margin: 0; font-size: 1rem; font-weight: 700; letter-spacing: -.01em; color: var(--text); }
.section-toggle .section-chevron {
  width: 20px; height: 20px; color: var(--text-faintest);
  transition: transform .25s;
  flex-shrink: 0;
}
.section-toggle.open .section-chevron { transform: rotate(180deg); }
.section-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height .4s ease;
}
.section-content.open {
  max-height: none;
  overflow: visible;
}

/* ── Funnel grid (4 across on desktop, 2 on mobile) ──────────────── */
.funnel-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: .65rem;
  margin-bottom: 1.25rem;
}

/* ── Responsive ───────────────────────────────────────────────────── */
@media (max-width: 600px) {
  .site-header { padding: 1.25rem 1rem; }
  .header-selects { flex-direction: column; align-items: flex-end; gap: .3rem; }
  .chips, .pills { display: none; }
  .metrics-grid { grid-template-columns: repeat(2, 1fr); }
  .funnel-grid { grid-template-columns: repeat(2, 1fr); }
  .exec-kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .exec-kpi-grid .metric-card:nth-child(3) { grid-column: span 2; }
  .exec-kpi-grid .metric-card:nth-child(6) { grid-column: span 2; }
  .exec-summary { padding: 1.25rem 1rem 1rem; }
  .exec-scorecard { font-size: .75rem; }
  .search-terms-grid { grid-template-columns: 1fr; }
  .platform-row { grid-template-columns: repeat(2, 1fr); }
}
/* ── Analyze button (inside paid ads accordion header) ───────────── */
.analyze-btn {
  background: none; border: 1px solid transparent;
  border-radius: 5px; color: var(--accent, #888); cursor: pointer;
  font-size: .68rem; font-family: inherit; font-weight: 700;
  padding: .2rem .55rem; letter-spacing: .03em;
  transition: border-color .15s, background .15s;
  flex-shrink: 0; margin-right: .25rem;
}
.analyze-btn:hover { border-color: var(--accent, #888); background: rgba(128,128,128,.08); }
@media print { .analyze-btn { display: none !important; } }

/* ── Campaign Analysis modal ──────────────────────────────────────── */
.analysis-overlay {
  position: fixed; inset: 0;
  background: var(--modal-overlay);
  display: flex; align-items: flex-start; justify-content: center;
  z-index: 1001; padding: 2.5rem 1rem 2rem;
  overflow-y: auto;
}
.analysis-box {
  background: var(--modal-bg); border-radius: var(--radius-xl);
  box-shadow: var(--shadow-modal);
  width: 100%; max-width: 760px;
  position: relative;
  font-family: var(--font-sans);
  margin: auto;
}
.analysis-modal-header {
  display: flex; align-items: center; gap: .65rem;
  padding: 1.25rem 1.5rem .9rem;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--modal-bg);
  z-index: 2; border-radius: var(--radius-xl) var(--radius-xl) 0 0;
}
.analysis-modal-swatch { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.analysis-modal-title  { font-size: .9375rem; font-weight: 700; color: var(--text); flex: 1; }
.analysis-modal-range  { font-size: .72rem; color: var(--text-muted); white-space: nowrap; }
.analysis-modal-close  {
  background: none; border: none; cursor: pointer;
  font-size: 1.05rem; color: var(--text-muted); line-height: 1;
  padding: .25rem; margin-left: .25rem; flex-shrink: 0;
}
.analysis-modal-close:hover { color: var(--text); }
.analysis-body { padding: 1.25rem 1.5rem 1.75rem; }
.analysis-sec-hdr {
  font-size: .68rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--text-muted);
  margin: 1.5rem 0 .7rem;
  padding-top: 1.25rem;
  border-top: 1px solid var(--border);
}
.analysis-sec-hdr:first-child { margin-top: 0; padding-top: 0; border-top: none; }
/* Recommendation cards */
.rec-item {
  border: 1px solid var(--border); border-radius: var(--radius-md);
  padding: .75rem 1rem; margin-bottom: .6rem;
  border-left-width: 3px;
}
.rec-item.high   { border-left-color: var(--clr-high); }
.rec-item.medium { border-left-color: var(--clr-medium); }
.rec-item.low    { border-left-color: var(--clr-low); }
.rec-row { display: flex; align-items: center; gap: .55rem; margin-bottom: .3rem; }
.rec-badge {
  font-size: .6rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; padding: .2rem .5rem; border-radius: var(--radius-sm);
  white-space: nowrap; flex-shrink: 0; line-height: 1.4;
}
.rec-badge.high   { background: var(--clr-high-bg);   color: var(--clr-high-text); }
.rec-badge.medium { background: var(--clr-medium-bg); color: var(--clr-medium-text); }
.rec-badge.low    { background: var(--clr-low-bg);    color: var(--clr-low-text); }
.rec-cat   { font-size: .68rem; color: var(--text-muted); font-weight: 600; }
.rec-title { font-size: .875rem; font-weight: 600; color: var(--text); }
.rec-detail { font-size: .8rem; color: var(--text-secondary); line-height: 1.55; margin-top: .3rem; }
/* Campaign health table */
.analysis-table {
  width: 100%; border-collapse: collapse; font-size: .8rem;
}
.analysis-table th {
  text-align: left; font-size: .67rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: var(--text-muted); background: var(--pill-bg);
  padding: .35rem .5rem; border-bottom: 1px solid var(--border);
}
.analysis-table td {
  padding: .5rem .5rem; border-bottom: 1px solid var(--border); vertical-align: middle;
}
.analysis-table tr:last-child td { border-bottom: none; }
.analysis-table .num { text-align: right; }
.qs-pill {
  display: inline-block; padding: .15rem .45rem;
  border-radius: 4px; font-size: .75rem; font-weight: 700;
}
.qs-pill.good     { background: var(--clr-success-bg);  color: var(--clr-success-strong); }
.qs-pill.warning  { background: var(--clr-medium-bg);  color: var(--clr-medium-text); }
.qs-pill.critical { background: var(--clr-high-bg);    color: var(--clr-high-text); }
/* Search term waste rows */
.waste-row {
  display: flex; align-items: center; gap: .5rem;
  padding: .4rem 0; border-bottom: 1px solid var(--border); font-size: .8rem;
}
.waste-row:last-child { border-bottom: none; }
.waste-term  { flex: 1; color: var(--text); }
.waste-spend { font-weight: 700; color: var(--text); white-space: nowrap; min-width: 56px; text-align: right; }
.waste-meta  { font-size: .72rem; color: var(--text-muted); white-space: nowrap; }
/* Lead quality rows */
.lq-row {
  display: flex; align-items: center; gap: .5rem;
  padding: .45rem 0; border-bottom: 1px solid var(--border); font-size: .8rem;
}
.lq-row:last-child { border-bottom: none; }
.lq-src  { flex: 1; color: var(--text); }
.lq-cnt  { font-weight: 600; color: var(--text); min-width: 32px; text-align: right; }
.lq-pct  { font-size: .72rem; color: var(--text-muted); min-width: 160px; text-align: right; }
.junk-row {
  padding: .45rem 0; border-bottom: 1px solid var(--border); font-size: .79rem;
}
.junk-row:last-child { border-bottom: none; }
.junk-name  { font-weight: 600; color: var(--text); }
.junk-email { color: var(--text-secondary); }
.junk-why   { font-size: .72rem; color: var(--clr-high);        margin-top: .12rem; }
.susp-why   { font-size: .72rem; color: var(--clr-medium-text); margin-top: .12rem; }
.analysis-empty { color: var(--text-muted); font-size: .82rem; font-style: italic; padding: .4rem 0; }
@media print { .analysis-overlay { display: none !important; } }

/* ── Forecasting section ─────────────────────────────────────────── */
.forecast-horizon-bar {
  display: flex;
  gap: .4rem;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
  align-items: center;
}
.forecast-horizon-btn {
  appearance: none; -webkit-appearance: none;
  background: var(--pill-bg); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text-secondary);
  cursor: pointer; font-family: inherit; font-size: .8rem;
  font-weight: 600; padding: .3rem .75rem;
  transition: background .15s, color .15s, border-color .15s;
}
.forecast-horizon-btn:hover { background: var(--hover-bg); color: var(--text); }
.forecast-horizon-btn.active {
  background: var(--brand-primary); border-color: var(--brand-primary);
  color: #fff;
}
[data-theme="dark"] .forecast-horizon-btn.active {
  background: #1E3A60; border-color: #2A4E7C; color: #E8EDF5;
}
.forecast-kpi-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: .65rem;
  margin-bottom: 1.25rem;
}
@media (max-width: 600px) { .forecast-kpi-row { grid-template-columns: repeat(2, 1fr); } }
.forecast-bar-wrap { margin-bottom: 1.5rem; }
.forecast-bar {
  display: flex;
  height: 10px;
  border-radius: 6px;
  overflow: hidden;
  background: var(--border);
  margin-bottom: .55rem;
}
.forecast-bar-seg { height: 100%; transition: width .35s ease; }
.forecast-bar-seg.locked    { background: #16A34A; }
.forecast-bar-seg.committed { background: #C87D3A; }
.forecast-bar-seg.probable  { background: #2563EB; }
.forecast-legend {
  display: flex;
  gap: .6rem 1.25rem;
  flex-wrap: wrap;
  font-size: .78rem;
}
.forecast-legend-item { display: flex; align-items: center; gap: .35rem; color: var(--text-secondary); }
.forecast-legend-dot {
  width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
}
.forecast-legend-dot.locked    { background: #16A34A; }

.forecast-table td:first-child { text-align: left; }

<script>
(function() {
  const html = document.documentElement;
  const saved = localStorage.getItem('theme');
  if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    html.setAttribute('data-theme', 'dark');
  }
  document.getElementById('theme-toggle').addEventListener('click', () => {
    const isDark = html.getAttribute('data-theme') === 'dark';
    if (isDark) {
      html.removeAttribute('data-theme');
      localStorage.setItem('theme', 'light');
    } else {
      html.setAttribute('data-theme', 'dark');
      localStorage.setItem('theme', 'dark');
    }
    document.getElementById('theme-icon').innerHTML = html.getAttribute('data-theme') === 'dark' ? '&#9788;' : '&#9790;';
    // Refresh all --metric-bg CSS vars for the new theme
    document.querySelectorAll('.accordion, .entity-row').forEach(node => {
      const key = node.dataset.entityKey;
      if (key) {
        const sty = window.__ENTITY_STYLES?.[key];
        if (sty) node.style.setProperty('--metric-bg', window.getMetricBg(sty));
      }
    });
  });
  document.getElementById('theme-icon').innerHTML = html.getAttribute('data-theme') === 'dark' ? '&#9788;' : '&#9790;';
})();
</script>

      const startDow = new Date(viewYear, viewMonth, 1).getDay();
      const selected = targetInput.value;

      let h = '<div class="cal-nav">';
      h += `<button class="cal-prev" ${canPrev ? '' : 'disabled'}>&lsaquo;</button>`;
      h += `<span>${MONTH_NAMES[viewMonth]} ${viewYear}</span>`;
      h += `<button class="cal-next" ${canNext ? '' : 'disabled'}>&rsaquo;</button>`;
      h += '</div><div class="cal-grid">';
      DAY_HDRS.forEach(d => h += `<div class="cal-hdr">${d}</div>`);

      // Leading blanks
      for (let i = 0; i < startDow; i++) h += '<div></div>';

      for (let day = 1; day <= dim; day++) {
        const iso = `${viewYear}-${String(viewMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const dt = new Date(iso + 'T00:00:00');
        const disabled = dt < minD || dt > maxD;
        const sel = iso === selected;
        h += `<div class="cal-day${disabled ? ' disabled' : ''}${sel ? ' selected' : ''}" data-date="${iso}">${day}</div>`;
      }
      h += '</div>';
      popupEl.innerHTML = h;

      popupEl.querySelector('.cal-prev')?.addEventListener('click', (e) => {
        e.stopPropagation();
        if (canPrev) { viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } draw(); }
      });
      popupEl.querySelector('.cal-next')?.addEventListener('click', (e) => {
        e.stopPropagation();
        if (canNext) { viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } draw(); }
      });
      popupEl.querySelectorAll('.cal-day:not(.disabled)').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          targetInput.value = el.dataset.date;
          displayEl.textContent = _fmtDisplay(el.dataset.date);
          popupEl.classList.remove('open');
        });
      });
    }
    draw();
    popupEl.classList.add('open');
  }

  customFromDisplay.addEventListener('click', (e) => {
    e.stopPropagation();
    document.getElementById('cal-to').classList.remove('open');
    _renderCal(document.getElementById('cal-from'), customFrom, customFromDisplay);
  });
  customToDisplay.addEventListener('click', (e) => {
    e.stopPropagation();
    document.getElementById('cal-from').classList.remove('open');
    _renderCal(document.getElementById('cal-to'), customTo, customToDisplay);
  });
  document.addEventListener('click', () => {
    document.getElementById('cal-from').classList.remove('open');
    document.getElementById('cal-to').classList.remove('open');
  });

  picker.addEventListener('change', (e) => {
    if (e.target.value === 'custom') {
      customPanel.classList.remove('hidden');
      return; // Don't render until Apply is clicked
    }
    customPanel.classList.add('hidden');
    REPORT = _RAW_DATA.presets[e.target.value];
    renderDashboard();
  });

  customApply.addEventListener('click', () => {
    const from = customFrom.value;
    const to = customTo.value;
    if (!from || !to || from > to) {
      alert('Please select a valid date range.');
      return;
    }
    REPORT = buildCustomReport(from, to);
    renderDashboard();
  });
} else {
  REPORT = _RAW_DATA;
}

// Returns ['all'] when all/no entities are selected, or an array of selected values
function _getSelectedEntities() {
  const panel = document.getElementById('entity-filter-panel');
  if (!panel) return ['all'];
  const allCk = panel.querySelector('input[value="all"]');
  if (allCk && allCk.checked) return ['all'];
  const sel = [...panel.querySelectorAll('input[type="checkbox"]:checked')]
    .map(i => i.value).filter(v => v !== 'all');
  return sel.length ? sel : ['all'];
}

// Build a merged filter map for an array of selected entity values (union across sections)
function _mergeFilterMaps(vals) {
  const out = { paid: new Set(), funnel: new Set(), seo: new Set(), exec: new Set() };
  vals.forEach(v => {
    const m = _ENTITY_FILTER_MAP[v];
    if (!m) return;
    ['paid', 'funnel', 'seo', 'exec'].forEach(k => (m[k] || []).forEach(x => out[k].add(x)));
  });
  return { paid: [...out.paid], funnel: [...out.funnel], seo: [...out.seo], exec: [...out.exec] };
}

// Lock the filter to a single entity value (used by standalone entity dashboards)
function _setEntityFilter(val) {
  const panel = document.getElementById('entity-filter-panel');
  if (!panel) return;
  const allCk = panel.querySelector('input[value="all"]');
  const others = [...panel.querySelectorAll('input[type="checkbox"]')].filter(i => i.value !== 'all');
  if (!val || val === 'all') {
    if (allCk) allCk.checked = true;
    others.forEach(i => i.checked = false);
  } else {
    if (allCk) allCk.checked = false;
    others.forEach(i => { i.checked = (i.value === val); });
  }
  _updateEntityFilterBtn();
}

// Sync the dropdown button label with the current selection
function _updateEntityFilterBtn() {
  const labelEl = document.getElementById('entity-filter-label');
  if (!labelEl) return;
  const sel = _getSelectedEntities();
  const panel = document.getElementById('entity-filter-panel');
  const totalOpts = panel ? panel.querySelectorAll('input[type="checkbox"]:not([value="all"])').length : 0;
  if (sel[0] === 'all' || sel.length >= totalOpts) {
    labelEl.textContent = 'All Entities';
  } else if (sel.length === 1) {
    const inp = panel && panel.querySelector(`input[value="${sel[0]}"]`);
    const lbl = inp ? inp.closest('label').textContent.trim() : sel[0];
    labelEl.textContent = lbl;
  } else {
    labelEl.textContent = `${sel.length} Entities`;
  }
}

function applyEntityFilter() {
  const sel = _getSelectedEntities();
  const isAll = sel[0] === 'all';
  const map = isAll ? null : _mergeFilterMaps(sel);

  // Filter accordions in each section by data-entity-key
  document.querySelectorAll('.accordion').forEach(acc => {
    const key = acc.dataset.entityKey;
    if (!key) { acc.style.display = ''; return; }
    if (isAll) { acc.style.display = ''; return; }

    // Determine which section this accordion is in
    const parent = acc.closest('[id]');
    const pid = parent ? parent.id : '';
    let visible = false;
    if (pid === 'section-funnels' || acc.querySelector('.funnel-grid')) {
      visible = map.funnel.includes(key);
    } else if (pid === 'section-paid' || key === 'summary') {
      visible = key === 'summary' ? false : map.paid.includes(key);
    } else if (pid === 'section-seo') {
      visible = map.seo.includes(key);
    } else {
      visible = map.paid.includes(key) || map.funnel.includes(key) || map.seo.includes(key);
    }
    acc.style.display = visible ? '' : 'none';
  });

  // Filter summary table rows
  document.querySelectorAll('.entity-row').forEach(row => {
    const key = row.dataset.entityKey;
    if (isAll) { row.style.display = ''; return; }
    row.style.display = map.paid.includes(key) ? '' : 'none';
  });

  // Filter exec scorecard rows by data-exec-key
  document.querySelectorAll('.exec-scorecard tbody tr[data-exec-key]').forEach(row => {
    const ek = row.dataset.execKey;
    if (isAll) { row.style.display = ''; return; }
    row.style.display = map.exec.includes(ek) ? '' : 'none';
  });

  // Update KPI cards based on filtered entities
  const kpiCards = document.querySelectorAll('.exec-kpi');
  function _kpiByName(name) { return document.querySelector(`.exec-kpi[data-kpi="${name}"]`); }
  if (kpiCards.length && window._execRowData) {
    const data = window._execRowData;
    const filtered = isAll ? data : data.filter(r => (map.exec.includes(r.key)));

    function _wowPct(c, p) { return p === 0 ? (c === 0 ? 0 : Infinity) : (c - p) / p; }
    function _fmtWow(pct) {
      if (pct === 0) return '<span class="wow-badge flat">— No change</span>';
      const cls = pct > 0 ? 'up' : 'down';
      const arrow = pct > 0 ? '&#9650;' : '&#9660;';
      const label = pct === Infinity ? 'New' : Math.abs(pct * 100).toFixed(0) + '% vs prev';
      return `<span class="wow-badge ${cls}">${arrow} ${label}</span>`;
    }
    function _setKpi(card, value, subtitle, wowPct) {
      if (!card) return;
      const valEl = card.querySelector('.metric-value');
      const subEl = card.querySelector('.metric-sub');
      const wowEl = card.querySelector('.wow-badge');
      if (valEl) valEl.textContent = value;
      if (subtitle && subEl) subEl.textContent = subtitle;
      if (wowEl && wowPct !== undefined) wowEl.outerHTML = _fmtWow(wowPct);
    }

    // New Revenue this Period
    const totalNewRev = filtered.reduce((s, r) => s + r.funnelRev, 0);
    const prevNewRev = filtered.reduce((s, r) => s + r.prevFunnelRev, 0);
    _setKpi(_kpiByName('new_revenue'), fmt.currency(totalNewRev), isAll ? 'From all pipelines' : null, _wowPct(totalNewRev, prevNewRev));

    // MRR — office_cowork (OfficeRND) or Ghost/Stripe subscription entities
    const hasPO = isAll || filtered.some(r => r.key === 'office_cowork');
    const hasGhostMrr = filtered.some(r => r.isGhost);
    const hasMrr = hasPO || hasGhostMrr;
    const mrrVal = hasMrr ? (window._execMrr || 0) : 0;
    const prevMrrVal = hasMrr ? (window._execPrevMrr || 0) : 0;
    const mrrSub = hasPO ? 'Private Office & Coworking' : (hasGhostMrr ? 'Subscription MRR' : 'N/A for this entity');
    _setKpi(_kpiByName('mrr'), fmt.currency(mrrVal), mrrSub, _wowPct(mrrVal, prevMrrVal));

    // Total Revenue This Month
    if (isAll) {
      _setKpi(_kpiByName('total_rev'), fmt.currency(window._execMtdRevenue || 0), window._execMtdLabel, _wowPct(window._execMtdRevenue || 0, window._execPrevMtdRevenue || 0));
    } else {
      const entityRev = filtered.reduce((s, r) => s + r.scoreRev, 0);
      _setKpi(_kpiByName('total_rev'), fmt.currency(entityRev), 'This period', undefined);
    }

    // Total New Leads (exclude Toast guest count)
    const totalLeads = filtered.filter(r => !r.isToast).reduce((s, r) => s + r.nl, 0);
    const prevLeads = filtered.filter(r => !r.isToast).reduce((s, r) => s + r.prevNl, 0);
    _setKpi(_kpiByName('leads'), fmt.int(totalLeads), isAll ? 'Across all entities' : null, _wowPct(totalLeads, prevLeads));

    // Total Ad Spend
    const totalSpend = filtered.filter(r => !r.isToast).reduce((s, r) => s + r.spend, 0);
    _setKpi(_kpiByName('ad_spend'), fmt.currency(totalSpend), 'Google + Meta', _wowPct(totalSpend, window._execPrevTotalSpend || 0));
  }

  // Hide entire sections (and their preceding divider) with no visible content
  ['section-paid', 'section-seo', 'section-funnels'].forEach(sid => {
    const sec = document.getElementById(sid);
    if (!sec) return;
    const divider = sec.previousElementSibling;
    if (isAll) {
      sec.style.display = '';
      if (divider && divider.classList.contains('section-divider')) divider.style.display = '';
      return;
    }
    const hasVisible = [...sec.querySelectorAll('.accordion')].some(a => a.style.display !== 'none');
    sec.style.display = hasVisible ? '' : 'none';
    if (divider && divider.classList.contains('section-divider')) divider.style.display = hasVisible ? '' : 'none';
  });

  // Update forecast section entity filter
  const _fcOuter = document.querySelector('.forecast-root');
  if (_fcOuter && _fcOuter._updateForecastFilter) {
    if (isAll) {
      _fcOuter._updateForecastFilter(null);
    } else {
      const fcKeys = new Set();
      sel.forEach(v => { (_FORECAST_KEY_MAP[v] || []).forEach(k => fcKeys.add(k)); });
      _fcOuter._updateForecastFilter([...fcKeys]);
    }
    // Show/hide the forecast section wrapper and its preceding divider
    const fcSec = document.getElementById('section-forecast');
    if (fcSec) {
      const fcDivider = fcSec.previousElementSibling;
      const hasVisibleFc = isAll || [..._fcOuter.querySelectorAll('tr.forecast-entity-row[data-forecast-key]')]
        .some(r => r.style.display !== 'none');
      fcSec.style.display = hasVisibleFc ? '' : 'none';
      if (fcDivider && fcDivider.classList.contains('section-divider')) {
        fcDivider.style.display = hasVisibleFc ? '' : 'none';
      }
    }
  }
}

// ── Custom date range aggregation engine ─────────────────────────────────────

const ENTITY_LABELS = {
  events_506: 'Events at 506',
  private_office: 'Private Office',
  catering: 'Nerra Catering',
  oak_and_glow: 'Oak & Glow Med Spa',
  smashing_boxes: 'Smashing Boxes',
  coworking: 'Coworking',
};
const SEO_ENTITY_LABELS = {
  smashing_boxes: 'Smashing Boxes',
  oak_and_glow: 'Oak & Glow Med Spa',
  durham_bottling: 'Durham Bottling Co.',
  nerra_catering: 'Nerra Catering',
  nerra_dining: 'Nerra Dining',
};
const SEO_ORDER = REPORT.seo_order || ['durham_bottling','nerra_catering','nerra_dining','oak_and_glow','smashing_boxes'];

function _formatDateRange(fromStr, toStr) {
  const f = new Date(fromStr + 'T00:00:00');
  const t = new Date(toStr + 'T00:00:00');
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  if (fromStr === toStr) return `${months[f.getMonth()]} ${f.getDate()}, ${f.getFullYear()}`;
  if (f.getMonth() === t.getMonth() && f.getFullYear() === t.getFullYear())
    return `${months[f.getMonth()]} ${f.getDate()}-${t.getDate()}, ${t.getFullYear()}`;
  return `${months[f.getMonth()]} ${f.getDate()}, ${f.getFullYear()} - ${months[t.getMonth()]} ${t.getDate()}, ${t.getFullYear()}`;
}

function _inRange(ts, from, to) {
  return ts >= from && ts <= to;
}

function _prevPeriod(fromStr, toStr) {
  const f = new Date(fromStr + 'T00:00:00');
  const t = new Date(toStr + 'T00:00:00');
  const span = Math.round((t - f) / 86400000) + 1;
  const pTo = new Date(f.getTime() - 86400000);
  const pFrom = new Date(pTo.getTime() - (span - 1) * 86400000);
  const pad = d => d.toISOString().slice(0, 10);
  return [pad(pFrom), pad(pTo)];
}

function buildCustomReport(fromStr, toStr) {
  const C = _RAW_DATA.custom;
  if (!C) return _RAW_DATA.presets[_RAW_DATA.default_preset]; // fallback

  const [prevFrom, prevTo] = _prevPeriod(fromStr, toStr);

  // -- Aggregate daily ad metrics per entity --------------------------------
  const entities = {};
  const ALL_ENTITIES = REPORT.entity_order || ['events_506','catering','private_office','coworking','oak_and_glow','smashing_boxes'];
  ALL_ENTITIES.forEach(ek => {
    const daily = C.daily_ads[ek] || {};
    let spend = 0, clicks = 0, impressions = 0, conversions = 0;
    Object.entries(daily).forEach(([d, m]) => {
      if (_inRange(d, fromStr, toStr)) {
        spend += m.spend; clicks += m.clicks;
        impressions += m.impressions; conversions += m.conversions;
      }
    });
    if (spend === 0 && clicks === 0 && impressions === 0 && conversions === 0) return;

    const platforms = [];
    // Determine platforms from data (simplified)
    if (spend > 0) platforms.push('Google');

    const cpl = conversions > 0 ? spend / conversions : null;
    entities[ek] = {
      label: ENTITY_LABELS[ek],
      platforms: platforms,
      total_spend: Math.round(spend * 100) / 100,
      total_clicks: clicks,
      total_conversions: Math.round(conversions * 100) / 100,
      cpl: cpl != null ? Math.round(cpl * 100) / 100 : null,
      google: { spend, clicks, impressions, conversions, ctr: clicks / (impressions || 1), cpc: clicks > 0 ? spend / clicks : 0 },
      meta: null,
      linkedin: null,
      google_campaigns: [],
      meta_campaigns: [],
      linkedin_campaigns: [],
      search_terms: [],
    };
  });

  // -- CRM funnel computation per entity ------------------------------------
  function _computeFunnel(records, fromS, toS) {
    const byEntity = {};
    records.filter(r => _inRange(r.ts, fromS, toS)).forEach(r => {
      const ek = r.entity;
      if (!byEntity[ek]) byEntity[ek] = { leads: [], tours: [], ts: [], ghl: [], hs: [], orn: [], office: [], orn_ms: [] };
      const bucket = r.src === 'tour' ? 'tours' : r.src === 'office' ? 'office' : r.src === 'orn' ? 'orn' : r.src === 'orn_ms' ? 'orn_ms' : r.src;
      if (byEntity[ek][bucket]) byEntity[ek][bucket].push(r);
    });
    return byEntity;
  }

  const crm = _computeFunnel(C.crm_records, fromStr, toStr);
  const prevCrm = _computeFunnel(C.crm_records, prevFrom, prevTo);

  const _EXCLUDED = new Set(['closed', 'lost']);

  // Compute TS revenue by definite_date (dd) from bookings within a date range
  // Uses ALL bookings (no date filter) so revenue is attributed when confirmed, not when lead was created
  const _tsBookings = C.ts_bookings || [];
  function _tsRevenueByDd(fromS, toS) {
    let rev = 0;
    for (const b of _tsBookings) {
      const dd = b.dd || '';
      if (!dd || dd < fromS || dd > toS) continue;
      if (_EXCLUDED.has(b.status)) continue;
      rev += b.rev || 0;
    }
    return rev;
  }
  function _tsFoodRevenueByDd(fromS, toS) {
    let food = 0;
    for (const b of _tsBookings) {
      const dd = b.dd || '';
      if (!dd || dd < fromS || dd > toS) continue;
      if (_EXCLUDED.has(b.status)) continue;
      if (b.food_rev > 0) food += b.food_rev;
    }
    return food;
  }
  function _tsBookedCountByDd(fromS, toS) {
    let count = 0;
    for (const b of _tsBookings) {
      const dd = b.dd || '';
      if (!dd || dd < fromS || dd > toS) continue;
      if (b.status === 'definite') count++;
    }
    return count;
  }
  function _tsFoodBookedCountByDd(fromS, toS) {
    let count = 0;
    for (const b of _tsBookings) {
      const dd = b.dd || '';
      if (!dd || dd < fromS || dd > toS) continue;
      if (_EXCLUDED.has(b.status)) continue;
      if (b.food_rev > 0) count++;
    }
    return count;
  }

  function _tsFunnel(records, revByDd, bookedByDd) {
    const excluded = records.filter(r => _EXCLUDED.has(r.status)).length;
    const nl = records.length - excluded;
    const ps = records.filter(r => ['proposal', 'proposal sent'].includes(r.status)).length;
    // Events booked: count by definite_date (when confirmed), not lead creation date
    const bk = bookedByDd != null ? bookedByDd : records.filter(r => ['booked', 'definite'].includes(r.status)).length;
    const td = records.filter(r => r.status === 'turned down').length;
    // Use definite_date revenue if provided, else fall back to summing record rev
    const rev = revByDd != null ? revByDd : records.filter(r => !_EXCLUDED.has(r.status)).reduce((s, r) => s + (r.rev || 0), 0);
    return { new_leads: nl, proposals_sent: ps, events_booked: bk, revenue_collected: rev, turned_down: td };
  }

  function _ghlFunnel(records) {
    const nl = records.length;
    const ps = records.filter(r => ['appt. requested','appt. confirmed','appt. completed'].includes(r.stage)).length;
    const bk = records.filter(r => r.stage === 'appt. completed').length;
    const rev = records.filter(r => r.stage === 'appt. completed').reduce((s, r) => s + (r.rev || 0), 0);
    return { new_leads: nl, proposals_sent: ps, events_booked: bk, revenue_collected: rev };
  }

  function _hsFunnel(records) {
    const nl = records.length;
    const wonStages = ['closedwon', 'closed won'];
    const propStages = ['proposalsent', 'proposal sent', 'negotiation', ...wonStages];
    const ps = records.filter(r => propStages.includes(r.stage)).length;
    const bk = records.filter(r => wonStages.includes(r.stage)).length;
    const rev = records.filter(r => wonStages.includes(r.stage)).reduce((s, r) => s + (r.rev || 0), 0);
    return { new_leads: nl, proposals_sent: ps, events_booked: bk, revenue_collected: rev };
  }

  function _officeFunnel(crmGroup) {
    const ornRecs = crmGroup?.orn || [];
    const offRecs = crmGroup?.office || [];
    const tourRecs = crmGroup?.tours || [];
    const msRecs = crmGroup?.orn_ms || [];
    // Dedup office leads by email against OfficeRND
    const ornEmails = new Set(ornRecs.map(r => r.email).filter(Boolean));
    const uniqueOffice = offRecs.filter(r => !r.email || !ornEmails.has(r.email));
    const nl = ornRecs.length + uniqueOffice.length;
    // Tours: ORN drop-ins + calendar tours, deduped by name
    const ornDropInNames = new Set(ornRecs.filter(r => r.status === 'drop-in').map(r => (r.name || '').toLowerCase()));
    const uniqueTours = tourRecs.filter(t => !(t.name || '').toLowerCase() || !ornDropInNames.has((t.name || '').toLowerCase()));
    const dropInCount = ornRecs.filter(r => r.status === 'drop-in').length;
    const tours = dropInCount + uniqueTours.length;
    const memberships = msRecs.length;
    const mrr = msRecs.reduce((s, r) => s + (r.price || 0), 0);
    return { new_leads: nl, proposals_sent: tours, events_booked: memberships, revenue_collected: mrr };
  }

  // Attach funnels to entities
  function _attachFunnel(ek, funnel, prevFunnel, mktEntity) {
    if (!entities[ek]) {
      entities[ek] = {
        label: ENTITY_LABELS[ek], platforms: [], total_spend: 0, total_clicks: 0,
        total_conversions: 0, cpl: null, google: null, meta: null, linkedin: null,
        google_campaigns: [], meta_campaigns: [], linkedin_campaigns: [], search_terms: [],
      };
    }
    const e = entities[ek];
    const mktImp = e.google?.impressions || 0;
    const mktClk = e.google?.clicks || 0;
    const mktConv = Math.max(funnel.new_leads, e.total_conversions || 0);
    e.funnel = {
      ...funnel,
      marketing: { impressions: mktImp, clicks: mktClk, conversions: mktConv },
    };
    e.funnel_prev = prevFunnel;
  }

  // Bookings data by definite_date (not filtered by lead creation date)
  const totalTsRev = _tsRevenueByDd(fromStr, toStr);
  const totalTsPrevRev = _tsRevenueByDd(prevFrom, prevTo);
  const totalFoodRev = _tsFoodRevenueByDd(fromStr, toStr);
  const totalPrevFoodRev = _tsFoodRevenueByDd(prevFrom, prevTo);
  const totalTsBooked = _tsBookedCountByDd(fromStr, toStr);
  const totalTsPrevBooked = _tsBookedCountByDd(prevFrom, prevTo);
  const foodBooked = _tsFoodBookedCountByDd(fromStr, toStr);
  const prevFoodBooked = _tsFoodBookedCountByDd(prevFrom, prevTo);

  // Events at 506 — revenue & booked count exclude food bookings (moved to catering)
  const evCrm = (crm.events_506?.ts || []);
  const evPrev = (prevCrm.events_506?.ts || []);
  const evRev = totalTsRev - totalFoodRev;
  const evPrevRev = totalTsPrevRev - totalPrevFoodRev;
  _attachFunnel('events_506', _tsFunnel(evCrm, evRev, totalTsBooked - foodBooked), _tsFunnel(evPrev, evPrevRev, totalTsPrevBooked - prevFoodBooked), 'events_506');
  if (entities.events_506) entities.events_506.leads = evCrm;

  // Catering — revenue = food rev, booked = food bookings confirmed in period
  const catCrm = (crm.catering?.ts || []);
  const catPrev = (prevCrm.catering?.ts || []);
  const catRev = totalFoodRev;
  const catPrevRev = totalPrevFoodRev;
  _attachFunnel('catering', _tsFunnel(catCrm, catRev, foodBooked), _tsFunnel(catPrev, catPrevRev, prevFoodBooked), 'catering');
  if (entities.catering) entities.catering.leads = catCrm;

  // Oak & Glow
  const ghlCrm = (crm.oak_and_glow?.ghl || []);
  const ghlPrev = (prevCrm.oak_and_glow?.ghl || []);
  _attachFunnel('oak_and_glow', _ghlFunnel(ghlCrm), _ghlFunnel(ghlPrev), 'oak_and_glow');
  if (entities.oak_and_glow) entities.oak_and_glow.ghl_leads = ghlCrm;

  // Smashing Boxes
  const hsCrm = (crm.smashing_boxes?.hs || []);
  const hsPrev = (prevCrm.smashing_boxes?.hs || []);
  _attachFunnel('smashing_boxes', _hsFunnel(hsCrm), _hsFunnel(hsPrev), 'smashing_boxes');
  if (entities.smashing_boxes) entities.smashing_boxes.hs_leads = hsCrm;

  // Private Office & Coworking
  const poCrm = crm.private_office || {};
  const poPrev = prevCrm.private_office || {};
  const poFunnel = _officeFunnel(poCrm);
  const poPrevFunnel = _officeFunnel(poPrev);

  // Non-MRR revenue breakdown (Booking Fees + One-off Fees) from OfficeRND invoices
  const MEMBERSHIP_FEES_ACCOUNT = '64512ea0aedd42a098d83367';
  const MRR_STATUSES = new Set(['paid', 'overdue']);
  const _ONEOFF = '64512ea0aedd42a267d83368';
  const _BOOKING = '64512ea0aedd42b7d2d83369';
  const _NON_MRR = new Set([_ONEOFF, _BOOKING]);
  function _nonMrrBreakdownForMonth(yr, mo) {
    const target = `${yr}-${String(mo).padStart(2, '0')}`;
    let booking = 0, oneoff = 0;
    (C.orn_payments || []).forEach(p => {
      if (p.period !== target) return;
      if (!MRR_STATUSES.has(p.status)) return;
      (p.lines || []).forEach(line => {
        if (line.account === _BOOKING) booking += line.amount || 0;
        else if (line.account === _ONEOFF) oneoff += line.amount || 0;
      });
    });
    return { booking_fees: booking, oneoff_fees: oneoff };
  }
  // Total invoiced revenue (MRR + non-MRR) for Exec Summary Revenue column
  function _totalRevenueForMonth(yr, mo) {
    const target = `${yr}-${String(mo).padStart(2, '0')}`;
    let t = 0;
    (C.orn_payments || []).forEach(p => {
      if (p.period !== target) return;
      if (!MRR_STATUSES.has(p.status)) return;
      (p.lines || []).forEach(line => {
        if (line.account === MEMBERSHIP_FEES_ACCOUNT || _NON_MRR.has(line.account))
          t += line.amount || 0;
      });
    });
    return t;
  }
  const toDateObj = new Date(toStr + 'T00:00:00');
  const _bd = _nonMrrBreakdownForMonth(toDateObj.getFullYear(), toDateObj.getMonth() + 1);
  poFunnel.booking_fees = _bd.booking_fees;
  poFunnel.oneoff_fees = _bd.oneoff_fees;
  const prevToObj = new Date(prevTo + 'T00:00:00');
  const _pbd = _nonMrrBreakdownForMonth(prevToObj.getFullYear(), prevToObj.getMonth() + 1);
  poPrevFunnel.booking_fees = _pbd.booking_fees;
  poPrevFunnel.oneoff_fees = _pbd.oneoff_fees;
  // Merge coworking ad metrics with private_office (zero out coworking to avoid double-count)
  if (entities.coworking && entities.private_office) {
    entities.private_office.total_spend += entities.coworking.total_spend;
    entities.private_office.total_clicks += entities.coworking.total_clicks;
    entities.private_office.total_impressions = (entities.private_office.google?.impressions || 0) + (entities.coworking.google?.impressions || 0);
    entities.coworking.total_spend = 0;
    entities.coworking.total_clicks = 0;
    entities.coworking.total_impressions = 0;
  }
  _attachFunnel('private_office', poFunnel, poPrevFunnel, 'private_office');
  // Exec Summary Revenue: total invoiced revenue (all MRR + non-MRR), not just new memberships
  if (entities.private_office) {
    entities.private_office.exec_revenue = _totalRevenueForMonth(toDateObj.getFullYear(), toDateObj.getMonth() + 1);
    entities.private_office.exec_revenue_prev = _totalRevenueForMonth(prevToObj.getFullYear(), prevToObj.getMonth() + 1);
  }
  if (entities.coworking) {
    entities.coworking.funnel = entities.private_office?.funnel;
    entities.coworking.funnel_prev = entities.private_office?.funnel_prev;
    entities.coworking.exec_revenue = entities.private_office?.exec_revenue;
    entities.coworking.exec_revenue_prev = entities.private_office?.exec_revenue_prev;
  }

  // -- Nerra Dining (Toast POS) -----------------------------------------------
  const toastDaily = C.toast_daily || {};
  let toastNet = 0, toastGuests = 0, toastOrders = 0, toastDiscounts = 0;
  let prevToastNet = 0, prevToastGuests = 0, prevToastOrders = 0, prevToastDiscounts = 0;
  Object.entries(toastDaily).forEach(([d, td]) => {
    if (_inRange(d, fromStr, toStr)) {
      toastNet += td.net_sales; toastGuests += td.guests; toastOrders += td.orders; toastDiscounts += (td.discounts || 0);
    }
    if (_inRange(d, prevFrom, prevTo)) {
      prevToastNet += td.net_sales; prevToastGuests += td.guests; prevToastOrders += td.orders; prevToastDiscounts += (td.discounts || 0);
    }
  });
  const toastAvgGuest = toastGuests > 0 ? Math.round(toastNet / toastGuests * 100) / 100 : 0;
  const toastAvgOrder = toastOrders > 0 ? Math.round(toastNet / toastOrders * 100) / 100 : 0;
  const prevToastAvgGuest = prevToastGuests > 0 ? Math.round(prevToastNet / prevToastGuests * 100) / 100 : 0;
  const prevToastAvgOrder = prevToastOrders > 0 ? Math.round(prevToastNet / prevToastOrders * 100) / 100 : 0;
  entities.nerra_dining = {
    label: 'Nerra Dining',
    platforms: [], total_spend: 0, total_clicks: 0, total_conversions: 0,
    cpl: null, google: null, meta: null, linkedin: null,
    google_campaigns: [], meta_campaigns: [], linkedin_campaigns: [], search_terms: [],
    toast_net_sales: Math.round(toastNet * 100) / 100,
    toast_guests: toastGuests,
    toast_orders: toastOrders,
    toast_discounts: Math.round(toastDiscounts * 100) / 100,
    toast_avg_guest: toastAvgGuest,
    toast_avg_order: toastAvgOrder,
    funnel: {
      new_leads: toastGuests, revenue_collected: Math.round(toastNet * 100) / 100,
      guests: toastGuests, orders: toastOrders, net_sales: Math.round(toastNet * 100) / 100,
      avg_guest: toastAvgGuest, avg_order: toastAvgOrder, discounts: Math.round(toastDiscounts * 100) / 100,
    },
    funnel_prev: {
      new_leads: prevToastGuests, revenue_collected: Math.round(prevToastNet * 100) / 100,
      guests: prevToastGuests, orders: prevToastOrders, net_sales: Math.round(prevToastNet * 100) / 100,
      avg_guest: prevToastAvgGuest, avg_order: prevToastAvgOrder, discounts: Math.round(prevToastDiscounts * 100) / 100,
    },
  };

  // -- D&D ReinKarnated (Ghost + Stripe) ------------------------------------
  if (C.crm_records && C.crm_records.some(r => r.src === 'ghost')) {
    const ghostAll = C.crm_records.filter(r => r.src === 'ghost');
    const ghostCur  = ghostAll.filter(r => _inRange(r.ts, fromStr, toStr));
    const ghostPrev = ghostAll.filter(r => _inRange(r.ts, prevFrom, prevTo));
    const newFree   = ghostCur.filter(r => r.status !== 'paid').length;
    const newPaid   = ghostCur.filter(r => r.status === 'paid').length;
    const prevFree  = ghostPrev.filter(r => r.status !== 'paid').length;
    const prevPaid  = ghostPrev.filter(r => r.status === 'paid').length;
    const totFree   = ghostAll.filter(r => r.ts <= toStr && r.status !== 'paid').length;
    const totPaid   = ghostAll.filter(r => r.ts <= toStr && r.status === 'paid').length;
    const prevTotFree = ghostAll.filter(r => r.ts <= prevTo && r.status !== 'paid').length;
    const prevTotPaid = ghostAll.filter(r => r.ts <= prevTo && r.status === 'paid').length;
    // Stripe revenue in range
    const stripeInv = C.stripe_invoices || [];
    let stripeRev = 0, prevStripeRev = 0;
    stripeInv.forEach(inv => {
      if (_inRange(inv.ts, fromStr, toStr)) stripeRev += inv.amount || 0;
      if (_inRange(inv.ts, prevFrom, prevTo)) prevStripeRev += inv.amount || 0;
    });
    const stripeMrr = C.stripe_mrr || 0;
    entities.dnd_reinkarnated = entities.dnd_reinkarnated || {
      label: 'D&D ReinKarnated', platforms: [], total_spend: 0, total_clicks: 0,
      total_conversions: 0, cpl: null, google: null, meta: null, linkedin: null,
      google_campaigns: [], meta_campaigns: [], linkedin_campaigns: [], search_terms: [],
    };
    // Merge Meta ad spend if present
    const dndAdEnt = C.daily_ads?.dnd_reinkarnated || {};
    let dndSpend = 0, dndClicks = 0, dndImpr = 0, dndConv = 0;
    Object.entries(dndAdEnt).forEach(([d, m]) => {
      if (!_inRange(d, fromStr, toStr)) return;
      dndSpend += m.spend; dndClicks += m.clicks; dndImpr += m.impressions; dndConv += m.conversions;
    });
    entities.dnd_reinkarnated.total_spend = Math.round(dndSpend * 100) / 100;
    entities.dnd_reinkarnated.total_clicks = dndClicks;
    entities.dnd_reinkarnated.total_impressions = dndImpr;
    entities.dnd_reinkarnated.funnel = {
      new_free_members: newFree, new_paid_members: newPaid,
      total_free_members: totFree, total_paid_members: totPaid,
      mrr: stripeMrr, revenue_collected: Math.round(stripeRev * 100) / 100,
      new_leads: newFree,
      marketing: { impressions: dndImpr, clicks: dndClicks, conversions: newFree },
    };
    entities.dnd_reinkarnated.funnel_prev = {
      new_free_members: prevFree, new_paid_members: prevPaid,
      total_free_members: prevTotFree, total_paid_members: prevTotPaid,
      mrr: stripeMrr, revenue_collected: Math.round(prevStripeRev * 100) / 100,
      new_leads: prevFree,
    };
  }

  // -- SEO (simplified for custom ranges) -----------------------------------
  const seo = {};
  Object.entries(C.ga4_map).forEach(([propId, seoEntity]) => {
    const daily = C.daily_ga4[propId] || {};
    let sessions = 0, users = 0, prevSessions = 0;
    Object.entries(daily).forEach(([d, m]) => {
      if (_inRange(d, fromStr, toStr)) { sessions += m.sessions; users += m.users; }
      if (_inRange(d, prevFrom, prevTo)) { prevSessions += m.sessions; }
    });
    if (sessions === 0 && users === 0) return;
    const change = prevSessions > 0 ? (sessions - prevSessions) / prevSessions : null;
    seo[seoEntity] = {
      label: SEO_ENTITY_LABELS[seoEntity],
      ga4: {
        organic: { sessions, users, engagement_rate: null, bounce_rate: null, conversions: 0, conversion_rate: null },
        all_traffic: null,
        daily_organic: null,  // No sparkline for custom
        prev_organic: { sessions: prevSessions },
      },
      landing_pages: null,  // Not available for custom ranges
      new_vs_returning: null,
      organic_search: null,
    };
  });

  // -- Compute totals -------------------------------------------------------
  const totalSpend = Object.values(entities).reduce((s, e) => s + (e.total_spend || 0), 0);

  // -- Compute MRR for the selected month from invoiced payments data ---------
  const toDate = new Date(toStr + 'T00:00:00');
  const toYear = toDate.getFullYear();
  const toMonth = toDate.getMonth(); // 0-based
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const firstOfMonth = `${toYear}-${String(toMonth + 1).padStart(2, '0')}-01`;
  const lastDay = new Date(toYear, toMonth + 1, 0).getDate();
  const lastOfMonth = `${toYear}-${String(toMonth + 1).padStart(2, '0')}-${String(lastDay).padStart(2, '0')}`;
  const targetPeriod = `${toYear}-${String(toMonth + 1).padStart(2, '0')}`;
  let mrr = 0;
  (C.orn_payments || []).forEach(p => {
    if (p.period !== targetPeriod) return;
    if (!MRR_STATUSES.has(p.status)) return;
    (p.lines || []).forEach(line => {
      if (line.account === MEMBERSHIP_FEES_ACCOUNT) mrr += line.amount || 0;
    });
  });

  // -- MTD revenue (1st of month through toStr) ------------------------------
  const mtdFrom = firstOfMonth;
  let mtdRev = 0;
  // Tripleseat MTD: revenue from ALL bookings by definite_date (not limited to wide range leads)
  _tsBookings.forEach(b => {
    const dd = b.dd || '';
    if (dd && _inRange(dd, mtdFrom, toStr) && !_EXCLUDED.has(b.status) && b.rev) mtdRev += b.rev;
  });
  // Other CRM sources: by creation date
  C.crm_records.forEach(r => {
    if (r.src !== 'ts' && _inRange(r.ts, mtdFrom, toStr) && r.rev) mtdRev += r.rev;
  });
  mtdRev += mrr;
  // Add Toast MTD net sales
  let mtdToastNet = 0;
  Object.entries(toastDaily).forEach(([d, td]) => {
    if (_inRange(d, mtdFrom, toStr)) mtdToastNet += td.net_sales;
  });
  mtdRev += mtdToastNet;

  // -- Previous-period ad spend -----------------------------------------------
  let prevTotalSpend = 0;
  Object.values(C.daily_ads).forEach(days => {
    Object.entries(days).forEach(([d, m]) => {
      if (_inRange(d, prevFrom, prevTo)) prevTotalSpend += m.spend;
    });
  });

  // -- Previous-month MRR & total revenue -------------------------------------
  const pmMonth = toMonth === 0 ? 11 : toMonth - 1;
  const pmYear = toMonth === 0 ? toYear - 1 : toYear;
  const pmFirst = `${pmYear}-${String(pmMonth + 1).padStart(2, '0')}-01`;
  const pmLastDay = new Date(pmYear, pmMonth + 1, 0).getDate();
  const pmLast = `${pmYear}-${String(pmMonth + 1).padStart(2, '0')}-${String(pmLastDay).padStart(2, '0')}`;
  const pmPeriod = `${pmYear}-${String(pmMonth + 1).padStart(2, '0')}`;
  let prevMrr = 0;
  (C.orn_payments || []).forEach(p => {
    if (p.period !== pmPeriod) return;
    if (!MRR_STATUSES.has(p.status)) return;
    (p.lines || []).forEach(line => {
      if (line.account === MEMBERSHIP_FEES_ACCOUNT) prevMrr += line.amount || 0;
    });
  });
  let prevMtdRev = 0;
  // Previous-month Tripleseat: revenue from ALL bookings by definite_date
  _tsBookings.forEach(b => {
    const dd = b.dd || '';
    if (dd && _inRange(dd, pmFirst, pmLast) && !_EXCLUDED.has(b.status) && b.rev) prevMtdRev += b.rev;
  });
  // Other CRM sources: by creation date
  C.crm_records.forEach(r => {
    if (r.src !== 'ts' && _inRange(r.ts, pmFirst, pmLast) && r.rev) prevMtdRev += r.rev;
  });
  prevMtdRev += prevMrr;
  // Add previous-month Toast net sales
  let pmToastNet = 0;
  Object.entries(toastDaily).forEach(([d, td]) => {
    if (_inRange(d, pmFirst, pmLast)) pmToastNet += td.net_sales;
  });
  prevMtdRev += pmToastNet;

  return {
    date_range: _formatDateRange(fromStr, toStr),
    generated_date: _RAW_DATA.generated_date,
    total_spend: Math.round(totalSpend * 100) / 100,
    entities: entities,
    seo: seo,
    mtd_revenue: Math.round(mtdRev * 100) / 100,
    mtd_month_label: monthNames[toMonth] + ' ' + toYear,
    mrr: Math.round(mrr * 100) / 100,
    prev_total_spend: Math.round(prevTotalSpend * 100) / 100,
    prev_mrr: Math.round(prevMrr * 100) / 100,
    prev_mtd_revenue: Math.round(prevMtdRev * 100) / 100,
    _is_custom: true,
  };
}
